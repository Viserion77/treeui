name: TBreadcrumb
legacy_alias: TreeBreadcrumb
source_file: packages/vue/src/components/TreeBreadcrumb.vue
package: "@treeui/vue"
kind: navigation
status: available
purpose: "Hierarchical navigation trail showing the user's current location within a site or application."

props:
  separator:
    type: string
    default: "/"
    description: "Character or string used to separate breadcrumb items."

events: []

slots:
  - default

a11y:
  element: nav
  aria_label: "Breadcrumb"
  current_page_aria_current: "page"
  uses_ol_for_ordered_list: true
  interactive_by_default: false

sub_components:
  TBreadcrumbItem:
    legacy_alias: TreeBreadcrumbItem
    source_file: packages/vue/src/components/TreeBreadcrumbItem.vue
    purpose: "Individual breadcrumb link or current-page indicator."
    props:
      to:
        type: "string | Record<string, unknown>"
        required: false
        description: "Route target. When provided and vue-router is available, renders RouterLink."
      href:
        type: string
        required: false
        description: "URL the breadcrumb item links to. Used as the anchor fallback when `to` is not provided."
      current:
        type: boolean
        default: false
        description: "Marks this item as the current page. Automatically set if it's the last item without a renderable link target."
    slots:
      - default
        note: "Label text for the breadcrumb item."
    a11y:
      renders_anchor_when_link_target_present: true
      renders_span_with_aria_current_page_when_current: true

routing:
  description: "TBreadcrumbItem accepts `to` for vue-router projects and falls back to native anchors when only `href` or a string `to` is available."
  peer_dependency: "vue-router (optional)"
  fallback: "native anchor element"

notes:
  - "Renders a <nav> with aria-label='Breadcrumb' wrapping an <ol>."
  - "Each item is an <li>. The last item uses aria-current='page'."
  - "Items are passed as default slot children using TBreadcrumbItem."
  - "Separator is injected via CSS pseudo-elements or provided via prop."

example: |
  <TBreadcrumb>
    <TBreadcrumbItem to="/">Home</TBreadcrumbItem>
    <TBreadcrumbItem to="/products">Products</TBreadcrumbItem>
    <TBreadcrumbItem>Current Page</TBreadcrumbItem>
  </TBreadcrumb>

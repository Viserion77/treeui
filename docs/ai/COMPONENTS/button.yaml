name: TButton
source_file: packages/vue/src/components/TButton.vue
package: "@treeui/vue"
kind: primitive
status: available
purpose: "Clickable action trigger with variants, sizes, optional polymorphism, and loading state."

props:
  as:
    type: string
    default: button
    note: "Root tag rendered through `<component :is>`. Any value other than `button` switches the component onto the non-native accessibility path (see `a11y`) and stops the `type` attribute from being rendered."
  variant:
    type: "TVariant | brand"
    default: solid
    values: [solid, outline, ghost, soft, danger, brand]
    note: "`brand` is a button-only, high-emphasis gradient variant driven by the `--tree-gradient-brand` token. Use it for the single primary CTA of a screen."
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
    note: "`t-button--md` is emitted but carries no CSS rule of its own — md is the base sizing, and only sm/lg override height, padding, and font size."
  disabled:
    type: boolean
    default: false
    note: "Applied as the native `disabled` attribute only when `as` is `button`; for any other tag the component falls back to `aria-disabled=\"true\"` plus `tabindex=\"-1\"`. Clicks are blocked in both cases."
  loading:
    type: boolean
    default: false
    note: "loading implies disabled behavior — the effective disabled state is `disabled || loading`, so `loading` on its own disables the button and applies `is-disabled`."
  loadingLabel:
    type: string
    default: Loading
    note: "Accessible announcement while loading, forwarded to the nested TSpinner's `label`. The default is English because TreeUI ships no i18n layer — pass the active locale's string to localize it (see DECISIONS.md → Locale Data)."
  hideIconWhileLoading:
    type: boolean
    default: true
    note: "While loading, the `icon` slot is not rendered so the spinner replaces the icon instead of rendering beside it. Set to `false` to restore the pre-0.19 behavior of showing both."
  iconOnly:
    type: boolean
    default: false
    note: "Square, icon-only button — collapses the inline padding to a 1:1 control matching the size token and suppresses the `t-button__label` wrapper. Requires an accessible name via `label` (or `aria-label`), since the icon slot is aria-hidden."
  label:
    type: string
    default: undefined
    note: "Accessible name, rendered as `aria-label`. Required whenever `iconOnly` is set; ignored for ordinary buttons that already have visible text."
  type:
    type: "button | submit | reset"
    default: button
    note: "Only forwarded when `as` is `button`; for any other tag no `type` attribute is rendered. Set `type=\"submit\"` for the submit control of an enclosing form."
  block:
    type: boolean
    default: false
    note: "Stretches the button to the full width of its container. Useful for menu rows and mobile CTAs."
  align:
    type: "start | center | end"
    default: center
    note: "Content alignment; only meaningful once the button is wider than its content, which in practice means together with `block`, since the base rule is `min-width: max-content`. Use `start` for left-aligned icon+label menu rows. The default `center` emits no modifier class — it is the base rule."

events:
  - name: click
    payload: "[event: MouseEvent]"
    description: "Emitted on activation. Suppressed while disabled or loading: the internal handler calls preventDefault() and stopPropagation() and returns without emitting."

slots:
  - icon
  - default

forwards_attrs_to: root_element

a11y:
  native_button_by_default: true
  native_disabled_attr_only_when_button: true
  aria_busy_when_loading: true
  aria_disabled_for_non_button: true
  tabindex_minus_one_when_non_button_disabled: true
  icon_slot_marked_aria_hidden: true
  loading_spinner_is_announced: "The nested TSpinner carries role=\"status\" and a visually hidden label, so the button's accessible name gains that text while loading. The text comes from `loadingLabel`, so it follows the app's locale."
  icon_only_requires_an_accessible_name: "With `iconOnly` there is no visible text and the icon slot is aria-hidden, so the name must come from `label` or `aria-label`. This is a documented requirement, not a runtime assertion — the package ships ESM+CJS with no dev-only build define, so there is no dev-stripped warning."
  touch_targets: "44×44px minimum via the .t-button::after overlay"
  focus_visible: "box-shadow focus ring on the root element"

css:
  block: t-button
  modifiers:
    - t-button--solid
    - t-button--outline
    - t-button--ghost
    - t-button--soft
    - t-button--danger
    - t-button--brand
    - t-button--sm
    - t-button--md
    - t-button--lg
    - t-button--block
    - t-button--icon
    - t-button--align-start
    - t-button--align-end
  elements:
    - t-button__spinner
    - t-button__icon
    - t-button__label
  states:
    - is-loading
    - is-disabled

behavior:
  blocks_click_when_disabled_or_loading: true
  renders_spinner_when_loading: true
  spinner_replaces_the_icon_slot_while_loading: "The spinner takes the icon's leading position, so by default the icon slot is withheld while loading and the order is spinner, label. Set `hideIconWhileLoading: false` for the older spinner, icon, label order."
  icon_slot_wrapper_rendered_only_when_filled: true
  default_slot_wrapped_in_label_element_unless_icon_only: true

example: |
  <TButton variant="outline">Invite teammate</TButton>
  <TButton :loading="saving" loading-label="Salvando">Salvar</TButton>
  <TButton icon-only label="Excluir" variant="ghost">
    <template #icon><TIcon name="trash-2" /></template>
  </TButton>

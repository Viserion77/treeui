name: TCard
source_file: packages/vue/src/components/TCard.vue
package: "@treeui/vue"
kind: layout
status: available
purpose: "Surface container with optional header and footer slots."

props:
  as:
    type: string
    default: section
  variant:
    type: TCardVariant
    default: outline
    values: [outline, soft, solid, inset]
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  title:
    type: string
    default: undefined
    description: "Optional card heading rendered inside the header area."

events: []

slots:
  - header
  - actions
  - default
  - footer

behavior:
  body_wrapper_class: tree-card__body

example: '<TCard><p>Quiet elegance for product UI.</p></TCard>'

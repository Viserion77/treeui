name: TCard
source_file: packages/vue/src/components/TCard.vue
package: "@treeui/vue"
kind: layout
status: available
purpose: "Surface container with optional header and footer slots."

props:
  as:
    type: string
    default: section
  variant:
    type: TCardVariant
    default: outline
    values: [outline, soft, inset]
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  title:
    type: string
    default: undefined
    description: "Optional card heading rendered inside the header area."

events: []

slots:
  - header
  - actions
  - default
  - footer

behavior:
  body_wrapper_class: t-card__body
  variant_effects:
    outline: "Base surface with a default border. The styling baseline — the `t-card--outline` class is emitted but carries no CSS rule of its own."
    soft: "Subtle tinted surface (bg-subtle), same border and shadow as outline."
    inset: "Same tinted surface as soft, but with no shadow, so it reads as recessed inside another surface."
  note: >
    No card variant inverts its surface, so nested content inherits the normal
    color tokens. For a high-emphasis card, use a brand-colored border rather
    than an inverted background.

example: '<TCard><p>Quiet elegance for product UI.</p></TCard>'

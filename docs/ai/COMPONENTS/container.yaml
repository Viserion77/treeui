name: TContainer
source_file: packages/vue/src/components/TContainer.vue
package: "@treeui/vue"
kind: layout
status: available
purpose: "Width-constrained layout wrapper for readable page content and app sections."

props:
  as:
    type: string
    default: div
  size:
    type: TContainerSize
    default: lg
    values: [sm, md, lg, xl, full]
    max_widths:
      note: >
        The literal max-width each size resolves to, so you can match an existing
        layout without reading the stylesheet. Defined in
        packages/vue/src/styles/index.css on `.t-container--<size>`.
      sm:
        class: .t-container--sm
        max_width: 40rem
      md:
        class: .t-container--md
        max_width: 48rem
      lg:
        class: .t-container--lg
        max_width: 64rem
        note: "Default size."
      xl:
        class: .t-container--xl
        max_width: 80rem
      full:
        class: .t-container--full
        max_width: none
        note: "No constraint — spans the parent."
      not_tokens: >
        These are Vue-component-specific layout values, deliberately NOT
        `--tree-*` design tokens. Do not add `--tree-container-*` variables; to
        change a width, override the `.t-container--<size>` rule or wrap your own
        element. Reuse TContainer rather than reimplementing these numbers.
  padded:
    type: boolean
    default: true
    note: >
      Adds `.is-padded`, i.e. an inline padding of
      `clamp(var(--tree-space-4), 3vw, var(--tree-space-6))`.
  centered:
    type: boolean
    default: true
    note: "Adds `.is-centered`, i.e. `margin-inline: auto`."

slots:
  - default

forwards_attrs_to: root_element
attrs_note: >
  Sets `inheritAttrs: false` and re-applies attrs by hand so they land on the
  dynamic `<component :is="as">` root: `class` is appended AFTER the
  `t-container` modifier and state classes, `style` is bound directly, and all
  remaining attrs are v-bound. The result matches Vue's default fallthrough
  merge — consumer classes win on equal specificity, nothing is dropped or
  overridden. TPage relies on this to pass its `t-page__inner` classes through.

composition:
  used_by: [TPage]
  note: >
    TPage renders a TContainer for its centered content column, forwarding
    `width` as `size` and `padded` as `padded`, and always forcing
    `centered`. Do not wrap a TPage in another TContainer.

types:
  TContainerSize: "'sm' | 'md' | 'lg' | 'xl' | 'full'"

css:
  block: t-container
  modifiers:
    - t-container--sm
    - t-container--md
    - t-container--lg
    - t-container--xl
    - t-container--full
  states:
    - is-padded
    - is-centered
  note: >
    The block rule only sets `width: 100%`; each size modifier adds nothing but
    `max-width`. Both state rules are compound selectors
    (`.t-container.is-padded`, `.t-container.is-centered`), so they outrank a
    plain single-class override — override them at equal-or-higher specificity.

behavior:
  semantic_element_controlled_by_as: true
  constrains_width_by_size: true
  can_disable_padding: true
  can_disable_auto_centering: true

a11y:
  - "Acts as a structural wrapper only; semantics come from the `as` prop and child content."
  - >
    Renders a non-semantic `div` by default. Pass `as` to make it a landmark
    (e.g. `as="main"`, `as="section"`, `as="header"`) — avoid nesting a second
    `main` inside an app shell or a TPage that already provides one.
  - "`aria-*` and `role` attributes fall through to the root element (see `forwards_attrs_to`)."

example: |
  <TContainer size="lg">
    <section>Page content</section>
  </TContainer>

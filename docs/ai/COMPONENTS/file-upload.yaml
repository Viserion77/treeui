name: TFileUpload
source_file: packages/vue/src/components/TFileUpload.vue
package: "@treeui/vue"
kind: form
status: available
purpose: "Composable dropzone and file picker with browse, drag-and-drop, and Ctrl+V paste support, plus per-file upload state: progress, remaining time, thumbnails, and independent per-file retry/resume."

props:
  modelValue:
    type: File[]
    default: "[]"
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  disabled:
    type: boolean
    default: false
    description: "The ONLY prop that gates interaction. Disables the dropzone, the native input, Clear all, and every per-row Remove/Retry."
  loading:
    type: boolean
    default: false
    description: "Presentational only. Applies `is-loading`, `aria-busy` on the dropzone, and the corner spinner. It gates NO interaction — see behavior.loading_is_presentational."
  invalid:
    type: boolean
    default: false
  accept:
    type: string
    default: ""
  multiple:
    type: boolean
    default: true
  maxFiles:
    type: number
    default: none
  maxFileSize:
    type: number
    default: none
  label:
    type: string
    default: Drop files here
  description:
    type: string
    default: Click to browse, drag and drop, or paste with Ctrl+V.
  buttonLabel:
    type: string
    default: Browse files
  filesLabel:
    type: string
    default: Selected files
  paste:
    type: boolean
    default: true
  drop:
    type: boolean
    default: true
  showFileList:
    type: boolean
    default: true
  uploadState:
    type: TFileUploadStateSource
    default: none
    description: "Per-file transport state, keyed by File OBJECT IDENTITY. Accepts a ReadonlyMap<File, TFileUploadState> or a (file, index) => TFileUploadState | undefined resolver. Omit it and the component renders exactly as before: no bars, no status lines, no retry."
  dragLabel:
    type: string
    default: Release to upload
    description: "Replaces `label` in the dropzone while an acceptable drag is over it. Set it to the same value as `label` to opt out of the text swap."
  dragRejectLabel:
    type: string
    default: This file type is not accepted
    description: "Replaces `label` while a drag that cannot work is over the dropzone. Only reachable when drag-reject detection is possible — see behavior.drag_reject_detection_is_mime_only."
  thumbnails:
    type: boolean
    default: true
    description: "Mint object-URL previews and decode dimensions for image/* files. Set false when you always supply `state.thumbnailUrl` yourself."
  maxThumbnailSize:
    type: number | null
    default: "10 * 1024 * 1024"
    description: "Skip auto-thumbnailing above this byte size. null removes the cap."
  retryLabel:
    type: string
    default: Retry
  resumeLabel:
    type: "(percent: number) => string"
    default: "(percent) => `Resume from ${percent}%`"
    description: "Receives Math.round(state.progress). Used only when state.resumable === true AND state.progress is a number."
  remainingTimeFormat:
    type: "(remainingMs: number) => string"
    default: "5s/60s/60min thresholds — see behavior.remaining_time_strings"
    description: "Formats state.remainingMs. Ignored for a row that supplies state.remainingLabel."
  statusLabels:
    type: "Partial<Record<TFileUploadStatus, string>>"
    default: "{}"
    description: "MERGED over the defaults { pending: Waiting, uploading: Uploading, paused: Paused, error: Upload failed, success: Uploaded } — pass only the keys you override."

events:
  update:modelValue:
    payload: "File[]"
    description: Emitted with the next file list when files are added, removed, or cleared.
  files-accepted:
    payload: "File[]"
    description: Emitted with only the newly accepted files, after accept/maxFiles/maxFileSize validation.
  files-rejected:
    payload: "TFileUploadRejection[]"
    description: Pre-acceptance validation failures. Unrelated to transport errors, which you report through `uploadState`.
  retry:
    payload: TFileUploadRetryPayload
    description: "Emitted when a row's retry affordance is activated. Pure intent — the component performs no upload. Use `payload.mode` ('resume' | 'restart'); it reports the affordance the component ACTUALLY DREW, so never re-derive it from your own state."
  cancel:
    payload: TFileUploadCancelPayload
    description: "Emitted ONLY for rows whose status is 'uploading' or 'paused', immediately BEFORE the `update:modelValue` that drops them — so the file is still in the list when your handler runs and you can abort the request. `reason` is 'remove' for one row or 'clear' (one event per in-flight file) for Clear all."

slots:
  icon:
    description: Replaces the dropzone icon.
  default:
    description: "Replaces the dropzone body. Receives `{ files, isDragActive, isDragReject, openFileDialog, clearFiles }`."
  file:
    description: "Full row override. Receives all of TFileUploadFileSlotProps, including every derived label, so a custom row re-derives nothing."
    note: "Additive — existing `v-slot:file=\"{ file, index, removeFile }\"` still works."
  file-status:
    description: "Replaces ONLY the progress bar + status line + error block inside the default row. Receives TFileUploadFileSlotProps. Name, meta, thumbnail, Retry, and Remove keep rendering. Ignored when the `file` slot is provided."
  actions:
    description: "Footer actions. Receives `{ files, openFileDialog, clearFiles }` — no upload state."

types:
  TFileUploadStatus: "'pending' | 'uploading' | 'paused' | 'error' | 'success'"
  TFileUploadState:
    status: TFileUploadStatus
    progress: "number (optional) — 0-100. Omit while 'uploading' for an indeterminate bar."
    uploadedBytes: "number (optional) — renders '2.1 MB of 2.4 MB uploaded' on error/paused."
    remainingMs: "number (optional) — raw ms, formatted by the remainingTimeFormat prop."
    remainingLabel: "string (optional) — pre-formatted ETA; WINS over remainingMs."
    error: "string (optional) — already-localized copy, rendered verbatim, read only when status === 'error'."
    resumable: "boolean (optional) — A CLAIM THE COMPONENT CANNOT VERIFY. true => the affordance reads 'Resume from N%' and `retry` emits mode: 'resume'. You must honor it."
    retryable: "boolean (optional) — defaults to true on error. false hides the retry button entirely (terminal failures: 413, virus scan reject)."
    thumbnailUrl: "string (optional) — your own preview URL. Wins over any locally minted object URL, and is NEVER revoked by the component."
    meta: "string (optional) — extra proof appended to the meta line, e.g. a checksum or server object id."
  TFileUploadStateSource: "ReadonlyMap<File, TFileUploadState> | ((file: File, index: number) => TFileUploadState | undefined)"
  TFileUploadRetryPayload:
    file: File
    index: number
    fileKey: "string — the component's opaque, stable render key. Not a prop; do not use it to key your own state."
    mode: "'resume' | 'restart'"
    state: TFileUploadState
  TFileUploadCancelPayload:
    file: File
    index: number
    fileKey: string
    state: TFileUploadState
    reason: "'remove' | 'clear'"
  TFileUploadFileSlotProps:
    file: File
    index: number
    fileKey: string
    state: "TFileUploadState | undefined — undefined when no uploadState is supplied OR when the lookup misses. Never normalized to 'pending'."
    thumbnailUrl: "string | undefined — state.thumbnailUrl ?? locally minted object URL."
    sizeLabel: "string — '2.4 MB'"
    typeLabel: "string — 'PNG' (extension-first, falls back to the MIME subtype, then 'FILE')."
    dimensionsLabel: "string | undefined — '1920 × 1080'; undefined until decoded, and for non-images."
    progressLabel: "string | undefined — '62%'; only while 'uploading' with numeric progress."
    remainingLabel: "string | undefined — 'About 12s left'; only while 'uploading'."
    uploadedLabel: "string | undefined — '2.1 MB of 2.4 MB uploaded'; only on error/paused with numeric uploadedBytes."
    statusLabel: "string | undefined — 'Uploading'"
    actionLabel: "string | undefined — 'Resume from 90%' | 'Retry'"
    canRetry: boolean
    retryMode: "'resume' | 'restart'"
    isDragActive: boolean
    isDragReject: boolean
    removeFile: "() => void"
    retryFile: "() => void"
  TFileUploadRejectionReason: "'file-invalid-type' | 'file-too-large' | 'too-many-files'"
  TFileUploadRejection:
    file: File
    reason: TFileUploadRejectionReason
    message: string

a11y:
  dropzone_role: button
  keyboard_activation: Enter_and_Space_open_the_file_picker
  supports_paste_when_component_is_focused: true
  file_feedback_announced_via_live_region: true
  aria_busy_on_dropzone_tracks_loading_prop: true
  aria_busy_on_row_tracks_that_rows_uploading_status: true
  per_row_progressbar_is_labelled_with_status_and_filename: "e.g. 'Uploading hero.png' — every row's bar has a distinct accessible name."
  terminal_transitions_announced_with_filenames: "One polite root live region (`role=log`) announces only success/error, e.g. 'alpha.txt uploaded.' / 'alpha.txt failed. Connection lost.'"
  repeated_identical_messages_are_still_announced: "The log appends each message as a new node rather than overwriting one string, so a retry that fails with the byte-identical error still mutates the region and is announced. It is not aria-atomic: only the appended message is read, and the trimmed history (5 most recent) is not."
  percentages_are_never_announced: "Percent and ETA live in non-live text; the value reaches assistive tech through the progressbar's aria-valuenow."
  retry_button_is_described_by_its_row_error: "Announces 'Resume from 90%, Connection lost at 90%'."
  focus_is_rescued_when_retry_unmounts: "Flipping error -> uploading removes the focused Retry; focus moves to that row's Remove (or the dropzone), and only when it was genuinely lost."
  remove_and_retry_meet_the_44px_target: true

behavior:
  accepts_files_from_input_drop_and_paste: true
  multiple_false_replaces_existing_selection: true
  accept_maxFiles_and_maxFileSize_apply_to_all_entry_points: true
  selected_files_can_be_removed_or_cleared: true
  upload_state_is_keyed_by_file_identity: "Both source shapes key on the File object, never on index or name. Key your own store with the File objects you receive from `files-accepted`."
  a_lookup_miss_renders_nothing: "An unknown File yields `undefined` and the row falls back to name + meta only — no bar, no status, no retry. This fail-blank is deliberate: it is the back-compat path and it fails loudly instead of showing another file's percentage."
  loading_is_presentational: "BREAKING since 0.14.0 — `loading` no longer disables anything. It was freezing the dropzone, Clear all, and every Remove, which blocked removing file 1 while file 4 uploaded. Use `:disabled` to reproduce the old behavior; prefer `uploadState` and freeze nothing."
  each_file_has_an_independent_track: "One row's error, progress, or retry never gates another's. Remove stays enabled for in-flight rows and emits `cancel` so you can abort."
  errors_are_per_row: "Transport errors go in `state.error` and render under their own row. They never enter the dropzone feedback list, which Remove and Clear all wipe."
  drag_feedback_has_three_signals: "Border, glow, and a text swap to `dragLabel` — all three fire together, including when files are already listed."
  drag_reject_detection_is_mime_only: "`is-drag-reject` + `dragRejectLabel` require every `accept` token to be a MIME token; with any `.ext` token the dropzone stays neutral, because a drag exposes only `.type`. A mixed drag (one good file, one bad) is NOT rejected, and the drop is never blocked — rejected files always get the normal `files-rejected` explanation."
  progress_bar_visibility: "Shown on uploading/paused/error, and on success only with numeric progress. 'uploading' without progress is indeterminate; paused/error without progress is a determinate 0 — an errored bar must never animate."
  the_bar_is_never_reset_on_error: "It holds `state.progress` in the error tone. That retained 90% is what makes the resume promise legible."
  remaining_time_strings: "< 5000ms -> 'Less than 5s left'; < 60s -> 'About 12s left'; < 60min -> 'About 2 min left'; else 'About 2h left'. Negative, NaN, and Infinity render nothing."
  status_line_composition: "Joins the present parts with ' · ': 'Uploading · 62% · About 12s left' while uploading, 'Upload failed · 2.1 MB of 2.4 MB uploaded' on a resumable error."
  thumbnails_are_client_only: "Object URLs are minted after mount and revoked on removal and unmount. SSR and the hydrating render both show the extension chip, so there is no mismatch."

example: |
  <script setup lang="ts">
  import { reactive, ref } from 'vue';
  import { TFileUpload } from '@treeui/vue';
  import type {
    TFileUploadCancelPayload,
    TFileUploadRetryPayload,
    TFileUploadState,
  } from '@treeui/vue';
  // Your transport. Must call onProgress(uploadedBytes) and honor `startByte` + `signal`.
  import { putResumable } from './uploads';

  const files = ref<File[]>([]);

  // Keyed by File identity — a reactive Map, so the component re-reads on every write.
  const uploads = reactive(new Map<File, TFileUploadState>());
  const controllers = new Map<File, AbortController>();

  const startUpload = async (file: File, startByte = 0) => {
    const controller = new AbortController();
    controllers.set(file, controller);

    const startedAt = Date.now();
    uploads.set(file, {
      status: 'uploading',
      progress: (startByte / file.size) * 100,
      uploadedBytes: startByte,
      resumable: true,
    });

    try {
      const result = await putResumable(file, {
        startByte,
        signal: controller.signal,
        onProgress: (uploadedBytes: number) => {
          const sentThisRun = Math.max(uploadedBytes - startByte, 1);
          const bytesPerMs = sentThisRun / Math.max(Date.now() - startedAt, 1);

          uploads.set(file, {
            status: 'uploading',
            progress: (uploadedBytes / file.size) * 100,
            uploadedBytes,
            // Raw ms — TFileUpload formats it into "About 12s left".
            remainingMs: (file.size - uploadedBytes) / bytesPerMs,
            resumable: true,
          });
        },
      });

      // Signal 04: confirmation with proof.
      uploads.set(file, { status: 'success', progress: 100, meta: `sha256:${result.checksum}` });
    } catch (error) {
      if (controller.signal.aborted) {
        uploads.delete(file);
        return;
      }

      // Signal 03: keep what was uploaded so the retry can resume instead of restarting.
      const previous = uploads.get(file);
      uploads.set(file, {
        status: 'error',
        progress: previous?.progress,
        uploadedBytes: previous?.uploadedBytes,
        error: (error as Error).message,
        resumable: true,
        retryable: (error as { status?: number }).status !== 413,
      });
    } finally {
      controllers.delete(file);
    }
  };

  const onFilesAccepted = (accepted: File[]) => {
    for (const file of accepted) {
      uploads.set(file, { status: 'pending' });
      void startUpload(file);
    }
  };

  // `mode` is the affordance the component actually drew — trust it, don't re-derive it.
  const onRetry = ({ file, mode, state }: TFileUploadRetryPayload) => {
    void startUpload(file, mode === 'resume' ? (state.uploadedBytes ?? 0) : 0);
  };

  // Fires BEFORE update:modelValue, so `file` is still in the list here.
  const onCancel = ({ file }: TFileUploadCancelPayload) => {
    controllers.get(file)?.abort();
  };
  </script>

  <template>
    <TFileUpload
      v-model="files"
      :upload-state="uploads"
      accept="image/*,.pdf"
      :max-files="5"
      :max-file-size="5 * 1024 * 1024"
      label="Attach assets"
      @files-accepted="onFilesAccepted"
      @retry="onRetry"
      @cancel="onCancel"
    />
  </template>

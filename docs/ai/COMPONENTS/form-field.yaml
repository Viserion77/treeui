component: TFormField
status: milestone-1
package: "@treeui/vue"
source: TFormField.vue
description: >
  Label + input wrapper with error and hint slots.
  Provides consistent layout, labelling, and validation messaging for any form control.

props:
  label:
    type: string
    required: false
    description: "Text content for the field label."
  htmlFor:
    type: string
    required: false
    description: >
      Rendered verbatim as the <label for> attribute. There is no id generation:
      when omitted, the label carries no `for` and is NOT associated with any control.
      The consumer must pass this AND set the same value as `id` on the child control.
  error:
    type: string
    required: false
    description: "Error message to display. When present, the hint is hidden and the field gets is-invalid state."
  hint:
    type: string
    required: false
    description: "Hint or help text displayed below the control. Hidden when error is present."
  required:
    type: boolean
    default: false
    description: "Adds a visual required indicator (*) next to the label."
  disabled:
    type: boolean
    default: false
    description: "Applies disabled styling (reduced opacity) to the entire field."
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
    description: "Controls the label font size."

slots:
  default:
    description: "The form control (e.g. TInput, TCheckbox, TSelect)."
  label:
    description: "Custom label content. Overrides the label prop text."
  error:
    description: "Custom error content. Overrides the error prop text."
  hint:
    description: "Custom hint content. Overrides the hint prop text."

events: []

css:
  root: t-form-field
  elements:
    - t-form-field__label
    - t-form-field__required
    - t-form-field__control
    - t-form-field__hint
    - t-form-field__error
  modifiers:
    - t-form-field--sm
    - t-form-field--md
    - t-form-field--lg
  states:
    - is-disabled
    - is-invalid
    - is-required

accessibility:
  - "Renders a native <label> element, but ONLY when `label` or the `label` slot is provided."
  - "Error messages are wrapped in role='alert' for screen reader announcements."
  - "Required indicator (*) is aria-hidden to avoid redundant announcements; use aria-required on the input itself."
  - "Error takes precedence over hint to avoid conflicting messages."
  - "Extra attrs land on the root <div> (inheritAttrs: false), not on the child control."

accessibility_gaps:
  summary: >
    TFormField is a layout and messaging wrapper. It wires up NO accessibility
    relationships on its own — the consumer owns every association below.
  label_association:
    automatic: false
    detail: >
      The label renders `:for="htmlFor"`. The component generates no id, so when
      `htmlFor` is omitted Vue drops the attribute entirely and the label points at
      nothing. Pass `htmlFor` and set the matching `id` on the control yourself.
  describedby:
    automatic: false
    detail: >
      The hint and error paragraphs are rendered without ids, and the component
      never emits `aria-describedby`. To have the hint/error announced with the
      control, put your own ids on them via the `hint`/`error` slots and set
      `aria-describedby` on the control.
  invalid_state:
    automatic: false
    detail: >
      `error` only adds the `is-invalid` class for styling. It does not set
      `aria-invalid` on the control — set it yourself.
  required_state:
    automatic: false
    detail: >
      `required` renders an aria-hidden `*` for sighted users only. Set `required`
      or `aria-required` on the control as well.
  consumer_pattern: |
    <TFormField label="Email" html-for="email" :error="emailError" hint="Work address">
      <TInput
        id="email"
        v-model="email"
        :aria-invalid="emailError ? 'true' : undefined"
        aria-describedby="email-help"
      />
      <template #hint><span id="email-help">Work address</span></template>
    </TFormField>

name: TIcon
source_file: packages/vue/src/components/TIcon.vue
package: "@treeui/vue"
kind: display
status: available
purpose: "Render a registered TreeUI icon by name with consistent sizing and accessibility defaults."

usage:
  three_ways_to_get_an_icon: >-
    (1) Use a built-in — 364 names ship in the registry: `<TIcon name="cpu" />`, or `icon: 'cpu'` on a
    TNavMenuItem. (2) Register your own with `registerTreeIcons`, from original geometry or an app-owned
    component, then use it by name everywhere a name is accepted — see `extension_api` and `example_register`.
    (3) Pass a component directly — but there is exactly ONE place that accepts one: the `icon` field of
    a `TNavMenuItem`, typed `TIconInput` (`TIconName | Component`). Everywhere else an icon is rendered
    into a SLOT, so you put a `<TIcon>` or your own component inside the slot.
  ticon_name_takes_only_a_name: >-
    `TIcon`'s own `name` prop is `TIconName`, not `TIconInput` — it does not accept a component. Option
    (3) above is about `TNavMenuItem.icon`, which is the only `icon` prop or item field in the whole
    library typed `TIconInput`. To render a component you hold in a variable, use
    `<component :is="MyIcon" />` directly, put it in an `#icon` slot, or register it first.
  no_component_has_an_icon_prop: >-
    TButton, TBadge, TAlert, TStat, TTag, TEmptyState, TConfirmDialog, and TFileUpload have NO `icon`
    prop. They take an icon through their `#icon` slot (TFileUpload and TStat included), so the correct
    form is `<TButton><template #icon><TIcon name="plus" /></template>Add</TButton>`, never
    `<TButton icon="plus">`. Only `TNavMenuItem.icon` takes a registry name or a component as a value.
  prefer_a_name_over_a_component: >-
    Passing a name avoids `markRaw`. A string is never made reactive, whereas a component object stored
    in a `ref`/`reactive` (a menu item array, a config object) makes Vue walk the component definition
    and log a reactivity warning. Names also survive JSON: they can come from an API response, a route
    definition, or a config file.
  never_hand_roll_an_svg: >-
    A hand-written `<svg viewBox="0 0 24 24" stroke-width="2">` loses the `absoluteStrokeWidth`
    correction (see `behavior.absolute_stroke_width_math`), so its painted stroke GROWS with the icon
    instead of staying constant: 1.67px at size 20, 2.67px at 32, 4px at 48. Beside library icons —
    which hold a flat 2px — it therefore reads slightly light at small sizes and plainly BOLD at large
    ones. It also loses the `size` / `strokeWidth` / `absoluteStrokeWidth` props and the `aria-hidden`
    default. Author icons with `createTreeIcon` (or register their geometry) instead.


name: TIcon
source_file: packages/vue/src/components/TIcon.vue
package: "@treeui/vue"
kind: display
status: available
purpose: "Render a registered TreeUI icon by name with consistent sizing and accessibility defaults."

props:
  name:
    type: TIconName
    required: true
    description: "Icon identifier from the @treeui/icons registry."
    values:
      - alert-circle
      - calendar
      - check
      - chevron-left
      - chevron-down
      - chevron-right
      - info
      - languages
      - loader-circle
      - search
      - x
  size:
    type: number | string
    default: 20
    description: "Pixel size for both width and height of the rendered svg."
    note: |
      This is a PIXEL COUNT, not the sm | md | lg token scale used by nearly every
      other TreeUI component. `<TIcon size="md" />` does not fail loudly: it writes
      width="md" / height="md" onto the svg, which the browser discards, so the
      icon becomes unsized and stretches to fill its container. Pass a number
      (20, 32) or a numeric string ("20"). To size an icon from tokens, leave `size`
      alone and set width/height in CSS from --tree-size-icon-sm | -md | -lg
      (16px / 20px / 24px) — this is what TLanguageSelect's switcher variant does.
  strokeWidth:
    type: number | string
    default: 2
  absoluteStrokeWidth:
    type: boolean
    default: true
    description: "When true, stroke width stays visually constant across sizes."
  label:
    type: string
    default: undefined
    description: "Accessible label. When set, the icon becomes role=\"img\" with aria-label; otherwise it is aria-hidden."

events: []
slots: []

a11y:
  decorative_by_default: true
  becomes_image_when_labeled: true
  rule: "Provide `label` only when the icon conveys meaning that is not already in adjacent text."

example: |
  <!-- Decorative -->
  <TIcon name="check" />

  <!-- Meaningful (no adjacent text) -->
  <TIcon name="alert-circle" label="Warning" size="32" />

related:
  - TBadge
  - TButton
  - TAlert

name: TLanguageSelect
source_file: packages/vue/src/components/TLanguageSelect.vue
package: "@treeui/vue"
kind: form_overlay
status: available
purpose: "Language/locale picker with a listbox, a flag per option, and the shared overlay contract; controlled and uncontrolled via v-model and open/defaultOpen."

props:
  modelValue:
    type: string
    default: ""
  options:
    type: "TLanguageOption[]"
    default: "[]"
    note: "Array of { label: string; value: string; code?: string; description?: string; disabled?: boolean }. `value` is an opaque application key (typically a BCP-47 tag) — never parsed or validated. `code` is an ISO 3166-1 alpha-2 country code for the flag; omit it to render the option without one. `description` is a secondary line, e.g. the endonym."
  open:
    type: boolean
    default: undefined
  defaultOpen:
    type: boolean
    default: false
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  variant:
    type: TLanguageSelectVariant
    default: field
    values: [field, switcher]
    note: "`field` is a form control, sized and laid out like any other input. `switcher` is a page-level control for a navbar/appbar where nothing nearby labels it: it leads with a translate icon, trails the current flag, and sizes to its content."
  iconOnly:
    type: boolean
    default: false
    note: "`switcher` only — ignored by `field`. Drops the visible language name, leaving the translate icon, the current flag, and the chevron. The trigger then has no text, so the consumer MUST pass an `aria-label`."
  width:
    type: TFieldWidth
    default: full
    values: [xs, sm, md, lg, xl, full]
    note: "Inline-size cap (max-inline-size). Fluid by default; use instead of an inline width style. Applies to `variant: field` only — a `switcher` sizes to its content and ignores it."
  disabled:
    type: boolean
    default: false
  loading:
    type: boolean
    default: false
  invalid:
    type: boolean
    default: false
  placeholder:
    type: string
    default: ""
  flagBaseUrl:
    type: string
    default: undefined
    note: "Forwarded to every nested TFlag. When omitted, TFlag's own default origin applies. Set once here to self-host flag assets."
  emptyText:
    type: string
    default: "No languages available."

events:
  - update:modelValue
  - update:open
  - open-change

slots:
  prefix:
    description: "Leading content inside the trigger, before everything else — the selected flag and label in `field`, the translate icon in `switcher`."
  option:
    scoped_props: "{ option: TLanguageOption, selected: boolean, focused: boolean }"
    content_restriction: presentational_only
    description: >
      Replaces the default option body (flag, label, description). Renders INSIDE
      the row's <li role="option">, so it must contain only presentational content.
  empty:
    description: "Replaces `emptyText` when `options` is empty."

forwards_attrs_to: trigger_button

types:
  TLanguageOption: "{ label: string; value: string; code?: string; description?: string; disabled?: boolean }"
  TLanguageSelectVariant: "'field' | 'switcher'"

a11y:
  role: listbox
  trigger_aria_haspopup: listbox
  trigger_aria_expanded: true
  trigger_aria_controls_when_open: true
  aria_invalid_when_invalid: true
  aria_busy_when_loading: true
  aria_selected_on_options: true
  aria_disabled_on_disabled_options: true
  focus_visible_on_trigger: true
  keyboard_arrow_navigation: true
  escape_closes_dropdown: true
  enter_space_selects_option: true
  home_end_navigation: true
  home_end_target_first_last_enabled_option: true
  focus_restores_to_trigger_on_close: true
  icon_only_removes_the_visible_language_name: true
  icon_only_requires_a_consumer_supplied_aria_label_on_the_trigger: true
  translate_icon_and_flags_are_decorative_not_the_accessible_name: true

behavior:
  update_payload_type: string
  loading_does_not_disable_by_itself: true
  placeholder_shown_as_muted_text: true
  chevron_rotates_when_open: true
  check_icon_on_selected_option: true
  outside_click_closes_dropdown: true
  listbox_flips_above_trigger_when_space_below_is_insufficient: true
  options_without_a_code_render_without_a_flag: true
  empty_options_render_the_empty_slot_or_empty_text: true
  field_variant_leads_the_trigger_with_the_selected_flag: true
  field_variant_trigger_fills_its_container: true
  switcher_variant_leads_the_trigger_with_a_translate_icon: true
  switcher_variant_trails_the_current_flag_before_the_chevron: true
  switcher_variant_trigger_sizes_to_its_content: true
  switcher_variant_ignores_the_width_prop: true
  switcher_listbox_aligns_to_the_trigger_right_edge: true
  switcher_listbox_may_be_wider_than_the_trigger: true
  icon_only_applies_to_the_switcher_variant_only: true
  root_classes: "t-language-select--field | t-language-select--switcher, plus t-language-select--icon-only"

notes:
  - "TreeUI ships NO locale, language, or country dataset. The component is options-driven: the application owns its language list and every locale side effect (i18n switching, persistence, document lang)."
  - "`code` is optional per option and is never derived from `value`. Flags-for-languages is imprecise by nature — Spanish is not Spain, English is not the US — so the choice of flag (or of no flag) stays with the application."
  - "Flags render through TFlag, which loads from a third-party CDN by default. Set `flagBaseUrl` once here to point every nested flag at a self-hosted mirror."
  - "Pick the variant by context, not by taste: inside a form, next to a label, use `field`. In a navbar/appbar, where nothing nearby says what the control changes, use `switcher` — the translate icon states the purpose and the trailing flag states the current value, so the control is self-describing."
  - "The switcher's translate icon is `TIcon name=\"languages\"`, sized in CSS from `--tree-size-icon-sm/md/lg`. TIcon's `size` prop is a pixel count, not the sm|md|lg token scale, so it is deliberately not passed here."

example_switcher: |
  <!-- Page-level language switcher in a navbar. No visible label anywhere near it,
       so the trigger carries its own aria-label; `iconOnly` makes that mandatory. -->
  <TNavbar>
    <template #end>
      <TLanguageSelect
        variant="switcher"
        icon-only
        aria-label="Page language"
        :options="languages"
        :model-value="locale"
        @update:model-value="locale = $event"
      />
    </template>
  </TNavbar>

example: |
  <TLanguageSelect
    aria-label="Language"
    placeholder="Choose a language"
    :options="[
      { label: 'Português (Brasil)', value: 'pt-BR', code: 'br', description: 'Português' },
      { label: 'English (US)', value: 'en-US', code: 'us', description: 'English' },
    ]"
    :model-value="locale"
    @update:model-value="locale = $event"
  />

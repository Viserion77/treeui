name: TLink
source_file: packages/vue/src/components/TLink.vue
package: "@treeui/vue"
kind: navigation
status: available
purpose: "Inline link with consistent styling, optional RouterLink rendering, and external link support."

props:
  to:
    type: "string | Record<string, unknown>"
    default: undefined
    description: "Route target. When provided and vue-router is available, renders RouterLink."
  href:
    type: string
    default: undefined
    description: "Native href for anchor elements. Ignored when `to` is provided with vue-router."
  external:
    type: boolean
    default: false
    description: "Opens link in new tab with rel='noopener noreferrer'."
  disabled:
    type: boolean
    default: false
  variant:
    type: TLinkVariant
    default: default
    values: [default, muted, danger]
    note: "Emphasis axis (colour), not decoration. There is deliberately no `plain` value — a decoration-free link uses `underline=\"none\"` + `weight`, keeping `variant` a pure emphasis axis (a `plain` value would be a homonym, the mistake that removed `solid` from TCard)."
  underline:
    type: TLinkUnderline
    default: always
    values: [always, hover, none]
    note: "When the underline shows. `always` is the base; `hover` underlines only on hover; `none` removes it (e.g. for a nav item or an icon+label lockup)."
  weight:
    type: TLinkWeight
    default: medium
    values: [regular, medium, semibold]
    note: "Text weight. `medium` matches the base link."

events: []

guidance:
  wrapping_a_card_or_button: "Do NOT wrap a TCard/TButton in TLink — text-decoration inherits to in-flow descendants and underlines the whole surface, and `.t-link` is display:inline around a grid child. Use the target's own `as` escape hatch instead: `<TCard as=\"a\" :href=\"…\" interactive>` or `<TCard as=\"router-link\" :to=\"…\" interactive>`. `interactive` adds the hover/focus affordance."

slots:
  - default

a11y:
  semantic_element: "a (or RouterLink, or span when disabled)"
  aria_disabled: "set when disabled"
  tabindex: "-1 when disabled"
  focus_visible: true

routing:
  description: "When `to` is provided and vue-router is installed, renders RouterLink. When only `href` is provided, renders native anchor. When disabled, renders span."
  peer_dependency: "vue-router (optional)"
  fallback: "native anchor element"

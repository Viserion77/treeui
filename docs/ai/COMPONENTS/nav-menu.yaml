name: TNavMenu
source_file: packages/vue/src/components/TNavMenu.vue
package: "@treeui/vue"
kind: navigation
status: available
purpose: "Vertical navigation menu with selection state, keyboard navigation, optional RouterLink rendering, and sidebar integration."

props:
  modelValue:
    type: string
    default: undefined
  defaultValue:
    type: string
    default: ""
  items:
    type: "TNavMenuItem[]"
    default: "[]"
    note: "Array of `{ label, value, shortLabel?, description?, icon?, to?, badge?, disabled?, exact? }`."
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  collapsed:
    type: boolean
    default: inherited_or_false
  disabled:
    type: boolean
    default: false
  exact:
    type: boolean
    default: true
    note: "Default active-match strategy for router-link items. `true` keeps only the exactly-active route highlighted (prevents prefix matches from lighting up several items at once). Override per item via `TNavMenuItem.exact`."

item_interface:
  name: TNavMenuItem
  fields:
    label: { type: string, required: true }
    value: { type: string, required: true }
    shortLabel: { type: string, required: false }
    description: { type: string, required: false }
    icon: { type: Component, required: false, description: "Vue component rendered as icon. Replaces the marker when provided." }
    to: { type: "string | Record<string, unknown>", required: false, description: "Route target. When provided and vue-router is available, renders RouterLink instead of button." }
    badge: { type: "string | number", required: false }
    disabled: { type: boolean, required: false }
    exact: { type: boolean, required: false, description: "Overrides the menu-level `exact` for this item. Set `false` for a section root that should stay active on nested routes." }

events:
  - update:modelValue
  - select

slots:
  - item
  - empty

a11y:
  semantic_root: nav
  roving_focus: true
  home_end_navigation: true
  arrow_navigation: true
  activation_keys_select_item: true
  aria_current: "page on selected item"
  aria_disabled: "on link items when disabled"

behavior:
  can_be_controlled_or_uncontrolled: true
  can_inherit_collapsed_state_from_sidebar: true
  supports_rich_item_rendering_via_slot: true

routing:
  description: "When an item has a `to` prop and vue-router is installed, TNavMenu renders a RouterLink. Otherwise it renders a button."
  peer_dependency: "vue-router (optional)"
  fallback: "button element"
  active_state: >-
    TNavMenu owns a single active highlight (`is-selected` + `aria-current="page"`). To keep this
    deterministic it maps Vue Router's active classes onto its own: controlled menus (explicit
    `modelValue`) neutralize the router's classes so only the bound selection shows, while uncontrolled
    menus let the current route drive selection using exact matching by default (see `exact`). This
    prevents Vue Router's inclusive `router-link-active` from marking several items active at once.

example: |
  <TNavMenu
    aria-label="Workspace sections"
    :items="items"
    :model-value="currentRoute"
    @update:model-value="currentRoute = $event"
  />

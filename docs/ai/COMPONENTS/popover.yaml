component: TPopover
status: stable
package: "@treeui/vue"
since: "0.5.0"
description: >
  Rich floating content panel anchored to a trigger element.
  Opened by click, dismissed by outside click or Escape.
  Supports four placement sides with alignment options.

anatomy:
  - t-popover              # root wrapper (relative positioning context)
  - t-popover__anchor      # trigger wrapper
  - t-popover__content     # floating panel (role="dialog")

props:
  - name: open
    type: boolean
    optional: true
    description: Controlled open state (v-model:open)

  - name: defaultOpen
    type: boolean
    default: false
    description: Initial open state for uncontrolled usage

  - name: disabled
    type: boolean
    default: false
    description: Prevents opening

  - name: side
    type: "'top' | 'right' | 'bottom' | 'left'"
    default: "'bottom'"
    description: Placement side relative to trigger

  - name: align
    type: "'start' | 'center' | 'end'"
    default: "'center'"
    description: Alignment along the placement axis

  - name: size
    type: TSize
    default: "'md'"
    description: "Panel density. Scales the content padding by the shared size tokens (sm → space-3, md → space-4, lg → space-5), so compact rich panels use a prop instead of overriding `.t-popover__content`. This is the `size` axis, not a density prop — TreeUI has no density axis (see DECISIONS.md → Density). For a compact menu of actions use TDropdown, which owns role=menu semantics; use TPopover for a rich non-menu panel."

  - name: id
    type: string
    optional: true
    description: Custom id for the content panel

events:
  - name: update:open
    payload: [value: boolean]
    description: Emitted when open state changes (enables v-model:open)

  - name: open-change
    payload: [value: boolean]
    description: Emitted when open state changes (non-v-model usage)

slots:
  - name: trigger
    props: { isOpen: boolean, contentId: string }
    description: >
      Custom trigger element. Receives the current open state and the id of the
      content panel, so aria-expanded and aria-controls can be wired by hand.
    replaces: "the built-in trigger button"
    you_must_supply:
      - "A focusable element as the slot root — a native <button type=\"button\"> is the safe default. Focus restore targets the first focusable descendant; with none, focus is lost on close."
      - "aria-haspopup=\"dialog\", :aria-expanded=\"isOpen\", and :aria-controls=\"isOpen ? contentId : undefined\" on that element."
      - "The disabled state, if you need one — the `disabled` prop is only bound to the default button."
    aria_is_not_automatic: >
      The component does NOT copy aria-haspopup/aria-expanded/aria-controls onto
      custom trigger content; those attributes exist only on the built-in button.
      That is what the `isOpen` and `contentId` scoped props are for — bind them
      yourself or the panel is unannounced.
    guidance: >
      Do not add your own @click that also toggles `open`: the anchor already
      toggles, so a second handler double-toggles and the panel appears not to open.

  - name: default
    description: Popover content displayed inside the floating panel.

a11y:
  role: dialog
  attrs:
    - aria-haspopup="dialog" on the built-in trigger (custom triggers must supply it)
    - aria-expanded on the built-in trigger (custom triggers bind it from `isOpen`)
    - aria-controls linking trigger to content (custom triggers bind it from `contentId`)
    - tabindex="-1" on content for focus management
  keyboard:
    - Click or Enter/Space on trigger toggles popover
    - Escape closes popover and restores focus to trigger
    - Tab navigates within popover content
  focus:
    - On open, focuses first focusable element inside content (or content itself)
    - On Escape close, restores focus to trigger
    - >
      Focus restore works with a custom trigger too: the ref lives on the
      `t-popover__anchor` wrapper, not on the built-in button, and focus returns
      to the first focusable element inside it.

  dismiss:
    - Outside click closes popover
    - Escape key closes popover

example_custom_trigger: |
  <TPopover id="filters-panel">
    <template #trigger="{ isOpen, contentId }">
      <TButton
        variant="ghost"
        aria-haspopup="dialog"
        :aria-expanded="isOpen"
        :aria-controls="isOpen ? contentId : undefined"
      >
        Filters
      </TButton>
    </template>
    <FilterForm />
  </TPopover>

contract: overlay_contract
composable: useControllableOpen

css_classes:
  - t-popover
  - t-popover__anchor
  - t-popover__content
  - t-popover__content--top
  - t-popover__content--right
  - t-popover__content--bottom
  - t-popover__content--left
  - t-popover__content--align-start
  - t-popover__content--align-center
  - t-popover__content--align-end
  - is-open
  - is-disabled

transition: t-popover-fade
z_index: var(--tree-z-dropdown)

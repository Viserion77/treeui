component: TProgress
package: "@treeui/vue"
since: "0.2.0"
status: draft

description: >
  Determinate and indeterminate progress indicator.
  Renders a linear bar only — there is no circular, ring, or radial variant,
  and no `variant`/`shape`/`type` prop. Compose one yourself if you need it.

props:
  value:
    type: number
    required: false
    description: "Current progress value (0–max). Omit for indeterminate."
  max:
    type: number
    default: 100
    description: "Maximum value."
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  label:
    type: string
    default: "Progress"
    description: "Accessible label read by screen readers."

events: {}

slots: {}

accessibility:
  role: progressbar
  attributes:
    - aria-valuenow (omitted when indeterminate)
    - aria-valuemin (always 0)
    - aria-valuemax (always 100)
    - aria-label
  keyboard: null
  notes: >
    Indeterminate state omits aria-valuenow so assistive tech
    announces the bar as indeterminate.
  value_is_normalized: >
    aria-valuenow is `value / max` expressed as a 0–100 percentage, not the raw
    `value`. aria-valuemax stays 100 regardless of the `max` prop, so the two
    always agree. The `label` is also repeated in a visually hidden span.

css:
  block: t-progress
  elements:
    - t-progress__track
    - t-progress__fill
  modifiers:
    - t-progress--sm
    - t-progress--md
    - t-progress--lg
    - t-progress--indeterminate

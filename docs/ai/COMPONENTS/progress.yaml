component: TProgress
package: "@treeui/vue"
since: "0.2.0"
status: draft

description: >
  Determinate and indeterminate progress indicator.
  Supports linear bar and circular ring variants.

props:
  value:
    type: number
    required: false
    description: "Current progress value (0–max). Omit for indeterminate."
  max:
    type: number
    default: 100
    description: "Maximum value."
  size:
    type: TreeSize
    default: md
    values: [sm, md, lg]
  label:
    type: string
    default: "Progress"
    description: "Accessible label read by screen readers."
  variant:
    type: string
    default: bar
    values: [bar, ring]
    description: "Visual style — linear bar or circular ring."

events: {}

slots: {}

accessibility:
  role: progressbar
  attributes:
    - aria-valuenow (omitted when indeterminate)
    - aria-valuemin (always 0)
    - aria-valuemax (always 100)
    - aria-label
  keyboard: null
  notes: >
    Indeterminate state omits aria-valuenow so assistive tech
    announces the bar as indeterminate.

css:
  block: tree-progress
  elements:
    - tree-progress__track
    - tree-progress__fill
    - tree-progress__ring
    - tree-progress__ring-track
    - tree-progress__ring-fill
  modifiers:
    - tree-progress--sm
    - tree-progress--md
    - tree-progress--lg
    - tree-progress--bar
    - tree-progress--ring
    - tree-progress--indeterminate

name: TStack
source_file: packages/vue/src/components/TStack.vue
package: "@treeui/vue"
kind: layout
status: available
purpose: "One-dimensional spacing and alignment wrapper for vertical or horizontal compositions."

props:
  as:
    type: string
    default: div
  direction:
    type: TStackDirection
    default: vertical
    values: [vertical, horizontal]
  gap:
    type: string
    default: var(--tree-space-4)
  align:
    type: string
    default: stretch
  justify:
    type: string
    default: flex-start
  wrap:
    type: boolean
    default: false
  reverse:
    type: boolean
    default: false
  grow:
    type: boolean
    default: false
    note: "Expands the stack to fill available space along its parent's main axis (flex: 1 with min-size 0). Use it to make a sidebar column fill its container height."
  fill:
    type: TStackFill
    default: undefined
    values: [viewport, parent]
    note: "Gives the stack a minimum block size so a centered child fills the screen (`viewport` → min-block-size 100dvh) or its parent (`parent` → min-block-size 100%). Compose with align/justify=center for a centered loading or empty state, and with TContainer/TPage for a reading width — no local height CSS. Distinct from `grow`, which fills a flex parent's main axis; `fill` sets a floor height on any block."

slots:
  - default

behavior:
  semantic_element_controlled_by_as: true
  horizontal_and_vertical_variants: true
  optional_wrapping: true
  optional_reverse_order: true

a11y:
  - "Acts as a layout wrapper only; semantics come from `as` and children."

example: |
  <TStack gap="var(--tree-space-3)">
    <h2>Section title</h2>
    <p>Supporting copy</p>
  </TStack>

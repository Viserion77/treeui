component: TTable
package: "@treeui/vue"
source: TTable.vue
description: Sortable, accessible data table with column definitions and row data.

props:
  columns:
    type: "TTableColumn[]"
    required: true
    description: Array of column definitions with key, label, sortable, align, and width.
  rows:
    type: "Record<string, unknown>[]"
    required: true
    description: Array of row data objects keyed by column keys.
  size:
    type: TSize
    default: md
    values: [sm, md, lg]
  sortBy:
    type: TTableSortState
    required: false
    description: Controlled sort state. When provided, overrides internal sort tracking.

events:
  sort:
    payload: "TTableSortState"
    description: Emitted when a sortable column header is clicked.

slots:
  "cell-{key}":
    description: Custom cell renderer for a specific column. Receives `{ row, value }`.
    note: "Use this when the displayed value does not come directly from `row[column.key]` or needs custom markup."
  "header-{key}":
    description: Custom header renderer for a specific column. Receives `{ column }`.
  empty:
    description: Content shown when rows array is empty.

types:
  TTableColumn:
    key: string
    label: string
    sortable: boolean (optional)
    align: "'left' | 'center' | 'right'" (optional)
    width: string (optional)
  TTableSortState:
    key: string
    direction: "'asc' | 'desc' | 'none'"

accessibility:
  role: grid
  aria-sort: Set on sortable column headers (ascending, descending, none).
  keyboard: Sortable headers are focusable and activated with Enter or Space.
  scope: col on all th elements.

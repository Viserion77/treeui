name: TTooltip
legacy_alias: TreeTooltip
source_file: packages/vue/src/components/TreeTooltip.vue
package: "@treeui/vue"
kind: overlay
status: available
purpose: "Small contextual overlay shown on hover or focus."

props:
  open:
    type: boolean
    default: controlled_optional
  defaultOpen:
    type: boolean
    default: false
  disabled:
    type: boolean
    default: false
  content:
    type: string
    default: ""
  side:
    type: TreeTooltipSide
    default: top
    values: [top, right, bottom, left]
  delay:
    type: number
    default: 80
  id:
    type: string
    default: auto

events:
  - update:open
  - open-change

slots:
  - trigger
  - default
  - content

forwards_attrs_to: trigger_wrapper

a11y:
  role: tooltip
  uses_aria_describedby_when_open: true
  opens_on_focus: true
  opens_on_hover: true

behavior:
  closes_on_blur: true
  closes_on_mouseleave: true
  uses_delay_for_pointer_open: true

example: '<TTooltip content="Helpful hint"><template #trigger><TButton>Invite</TButton></template></TTooltip>'

version: 0.1
package: "@treeui/vue"
public_component_prefix: "T"
source_component_filename_prefix: "T"

# Every component value exported from packages/vue/src/components/index.ts.
# This list is the canonical answer to "does TreeUI already have X?" — check it
# before proposing a new component or a new prop, because a capability that
# already ships here is not missing, only undocumented.
# Maintenance: must stay 1:1 with the `export { default as ... }` lines in
# packages/vue/src/components/index.ts. Verify with:
#   grep -oP '^export \{ default as \K\w+' packages/vue/src/components/index.ts | sort
primary_exports_count: 75
primary_exports:
  - TAccordion
  - TAccordionItem
  - TAlert
  - TAppBar
  - TAppShell
  - TAvatar
  - TBadge
  - TBreadcrumb
  - TBreadcrumbItem
  - TButton
  - TCard
  - TChart
  - TCheckbox
  - TColorSwatch
  - TCombobox
  - TConfirmDialog
  - TContainer
  - TContextMenu
  - TDatePicker
  - TDateTimePicker
  - TDivider
  - TDonutChart
  - TDrawer
  - TDropdown
  - TEmptyState
  - TFileUpload
  - TFormField
  - TGrid
  - TIcon
  - TInput
  - TKbd
  - TLink
  - TMarkdownEditor
  - TModal
  - TMultiSelect
  - TNavMenu
  - TNavbar
  - TNumberInput
  - TPage
  - TPageHeader
  - TPagination
  - TPopover
  - TPricing
  - TPricingCard
  - TProgress
  - TRadio
  - TRadioGroup
  - TSelect
  - TSelectableList
  - TSidebar
  - TSkeleton
  - TSpacer
  - TSparkline
  - TSpinner
  - TSplit
  - TStack
  - TStackItem
  - TStat
  - TStepper
  - TSteps
  - TSwitch
  - TTab
  - TTabList
  - TTabPanel
  - TTable
  - TTabs
  - TTag
  - TText
  - TTextarea
  - TTimeline
  - TToast
  - TToastProvider
  - TToggleGroup
  - TTooltip
  - TTreeView

export_aliases:
  note: "Two exports are aliases of the same component, not separate components. Counted individually above."
  pairs:
    - canonical: TNavbar
      alias: TAppBar
    - canonical: TSteps
      alias: TStepper

layout_capabilities_already_shipping:
  note: >
    Layout sizing and flex behavior already exist as dedicated primitives. Reach
    for these before adding `fill`, `grow`, `flex`, or width props to individual
    components — that capability is composed, not duplicated per component.
  TStackItem:
    props: [grow, shrink, basis, minWidth, align]
    purpose: >
      Per-child flex control inside a TStack. `grow` makes one child absorb the
      free space; `minWidth` is the standard fix for a flex child that refuses to
      shrink below its content.
  TStack:
    purpose: "One-dimensional layout — direction, gap, align, justify, wrap."
  TSplit:
    purpose: "Two-region row that pushes the second region to the far edge."
  TSpacer:
    purpose: "Flexible gap that absorbs free space between siblings."
  TGrid:
    purpose: "Responsive multi-column layout."
  TContainer:
    purpose: "Max-width constraint and horizontal page padding."
  TPage:
    purpose: "Page region: width constraint plus block padding and vertical rhythm."

shared_sizes:
  values: [sm, md, lg]
  used_by:
    - TBadge
    - TButton
    - TCard
    - TCombobox
    - TConfirmDialog
    - TDatePicker
    - TDropdown
    - TEmptyState
    - TFileUpload
    - TFormField
    - TInput
    - TSelect
    - TTextarea
    - TModal
    - TSpinner
    - TSwitch
    - TTimeline
    - TTabs

shared_variants:
  action_values: [solid, outline, ghost, soft, danger]
  card_values: [outline, soft, inset]
  card_values_note: >
    Card variants are a surface scale (plain → tinted → recessed), a different
    axis from the action variants above. `solid` is deliberately absent: it is
    an action variant only. See DECISIONS.md → "Variant Vocabulary".
  button_extra_values:
    values: [brand]
    note: "TButton adds a high-emphasis `brand` gradient variant (via `--tree-gradient-brand`) on top of the shared action values. It is button-only, not a shared action variant."

shared_props:
  variant:
    used_by: [TBadge, TButton, TCard]
  tone:
    used_by: [TBadge, TStat]
  size:
    used_by: [TBadge, TButton, TCard, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TModal, TRadio, TRadioGroup, TSelect, TSpinner, TTextarea, TTimeline]
  width:
    used_by: [TInput, TSelect, TTextarea]
    values: [xs, sm, md, lg, xl, full]
    default: full
    note: >-
      Inline-size scale for form controls (type `TFieldWidth`). Controls are
      fluid by default; the other steps set a `max-inline-size` cap so they
      still shrink on narrow containers. Prefer this over inline width styles.
      Caps: xs 8rem, sm 12rem, md 18rem, lg 24rem, xl 32rem.
  disabled:
    used_by: [TButton, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TModal, TRadio, TRadioGroup, TSelect, TSwitch, TTextarea, TTooltip]
  loading:
    used_by: [TButton, TCombobox, TConfirmDialog, TFileUpload, TInput, TSelect, TTextarea, TChart, TDonutChart]
    note: >-
      loading conveys busy state. On single action controls (TButton, TConfirmDialog)
      it also disables that one control to prevent double submission. On form value
      controls (TFileUpload, TInput, TSelect, TTextarea, TCombobox) it is presentational
      only and must never gate interaction.
  as:
    used_by: [TButton, TCard]
  class:
    status: "supported via standard Vue attrs when relevant"

shared_events:
  update:modelValue:
    used_by: [TCheckbox, TCombobox, TDatePicker, TFileUpload, TInput, TRadioGroup, TSelect, TSwitch, TTextarea]
  update:open:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TModal, TSelect, TTooltip]
  open-change:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TModal, TSelect, TTooltip]

shared_slots:
  default:
    used_by: [TBadge, TButton, TCard, TConfirmDialog, TFileUpload, TInput, TModal, TTooltip]
  icon:
    used_by: [TBadge, TButton, TFileUpload]
  prefix:
    used_by: [TCombobox, TDatePicker, TInput]
  suffix:
    used_by: [TDatePicker, TInput]
  trigger:
    used_by: [TConfirmDialog, TDrawer, TModal, TTooltip]
  content:
    used_by: [TDrawer, TModal, TTooltip]
  header:
    used_by: [TCard, TDrawer, TModal]
  footer:
    used_by: [TCard, TDrawer, TModal]

value_formats:
  date: "YYYY-MM-DD"

dataviz_contract:
  components: [TChart, TSparkline, TDonutChart]
  engine: "Pure geometry helpers live in @treeui/utils (niceScale, linearScale, buildLinePath, buildAreaPath, donutSegments) — framework-agnostic and reusable from React."
  series_shape:
    used_by: [TChart]
    type: "{ name: string; data: number[]; color?: string }"
    note: "Each series' `data` is aligned index-for-index to the `labels` array."
  segment_shape:
    used_by: [TDonutChart]
    type: "{ label: string; value: number; color?: string }"
    note: "Non-positive `value`s are omitted; fractions are computed from the sum of the rest."
  palette:
    tokens: "--tree-color-chart-1 … --tree-color-chart-8"
    rule: "Series/segments auto-assign these in order (cycling after 8). A per-series `color` overrides. Never map color to rank — keep a series' color stable when the set changes."
  value_format:
    prop: valueFormat
    type: "(value: number) => string"
    used_by: [TChart, TDonutChart]
    default: "Locale-grouped integers for |value| >= 1000, raw otherwise."
  accessibility:
    - "TChart renders a visually-hidden <table> mirror of the series data; the SVG is aria-hidden."
    - "TSparkline and TDonutChart expose role=img with an aria-label (auto-generated, overridable)."
    - "A legend is shown by default for >= 2 series/segments so identity never relies on color alone."
    - "Entrance animation is gated behind prefers-reduced-motion."

overlay_contract:
  props:
    - open
    - defaultOpen
  events:
    - update:open
    - open-change
  rule: "controlled and uncontrolled modes should behave the same from the outside"

form_contract:
  props:
    - modelValue
  events:
    - update:modelValue

responsive_contract:
  props:
    - mobile
    - breakpoint
  used_by:
    - TAppShell
  rule: "`mobile` is an optional boolean override; when left undefined the component derives the mode from `breakpoint` (a CSS max-width). An explicit `mobile` value always wins over the breakpoint."

accessibility_baseline:
  focus_visible: true
  keyboard_support: true
  semantic_markup: true
  disabled_state_clarity: true
  loading_state_clarity: true
  screen_reader_labels_when_needed: true

notes:
  - "Use T<Name> in examples, docs, and code. There are no Tree<Name> aliases."
  - "Do not introduce Vue-specific naming into tokens or design contracts."

version: 0.1
package: "@treeui/vue"
public_component_prefix: "T"
source_component_filename_prefix: "T"

primary_exports:
  - TAlert
  - TBadge
  - TBreadcrumb
  - TBreadcrumbItem
  - TButton
  - TCard
  - TCheckbox
  - TCombobox
  - TConfirmDialog
  - TDatePicker
  - TDropdown
  - TDrawer
  - TEmptyState
  - TFileUpload
  - TFormField
  - TInput
  - TModal
  - TRadio
  - TRadioGroup
  - TSelect
  - TSkeleton
  - TSpinner
  - TSwitch
  - TTabs
  - TTabList
  - TTab
  - TTabPanel
  - TToast
  - TToastProvider
  - TTooltip
  - TAvatar
  - TDivider
  - TTable
  - TTag
  - TTimeline
  - TLink
  - TChart
  - TSparkline
  - TDonutChart

shared_sizes:
  values: [sm, md, lg]
  used_by:
    - TBadge
    - TButton
    - TCard
    - TCombobox
    - TConfirmDialog
    - TDatePicker
    - TDropdown
    - TEmptyState
    - TFileUpload
    - TFormField
    - TInput
    - TSelect
    - TTextarea
    - TModal
    - TSpinner
    - TSwitch
    - TTimeline
    - TTabs

shared_variants:
  action_values: [solid, outline, ghost, soft, danger]
  card_values: [outline, soft, solid, inset]

shared_props:
  variant:
    used_by: [TBadge, TButton, TCard]
  tone:
    used_by: [TBadge, TStat]
  size:
    used_by: [TBadge, TButton, TCard, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TModal, TRadio, TRadioGroup, TSelect, TSpinner, TTextarea, TTimeline]
  disabled:
    used_by: [TButton, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TModal, TRadio, TRadioGroup, TSelect, TSwitch, TTextarea, TTooltip]
  loading:
    used_by: [TButton, TCombobox, TConfirmDialog, TFileUpload, TInput, TSelect, TTextarea, TChart, TDonutChart]
  as:
    used_by: [TButton, TCard]
  class:
    status: "supported via standard Vue attrs when relevant"

shared_events:
  update:modelValue:
    used_by: [TCheckbox, TCombobox, TDatePicker, TFileUpload, TInput, TRadioGroup, TSelect, TSwitch, TTextarea]
  update:open:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TModal, TSelect, TTooltip]
  open-change:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TModal, TSelect, TTooltip]

shared_slots:
  default:
    used_by: [TBadge, TButton, TCard, TConfirmDialog, TFileUpload, TInput, TModal, TTooltip]
  icon:
    used_by: [TBadge, TButton, TFileUpload]
  prefix:
    used_by: [TCombobox, TDatePicker, TInput]
  suffix:
    used_by: [TDatePicker, TInput]
  trigger:
    used_by: [TConfirmDialog, TDrawer, TModal, TTooltip]
  content:
    used_by: [TDrawer, TModal, TTooltip]
  header:
    used_by: [TCard, TDrawer, TModal]
  footer:
    used_by: [TCard, TDrawer, TModal]

value_formats:
  date: "YYYY-MM-DD"

dataviz_contract:
  components: [TChart, TSparkline, TDonutChart]
  engine: "Pure geometry helpers live in @treeui/utils (niceScale, linearScale, buildLinePath, buildAreaPath, donutSegments) — framework-agnostic and reusable from React."
  series_shape:
    used_by: [TChart]
    type: "{ name: string; data: number[]; color?: string }"
    note: "Each series' `data` is aligned index-for-index to the `labels` array."
  segment_shape:
    used_by: [TDonutChart]
    type: "{ label: string; value: number; color?: string }"
    note: "Non-positive `value`s are omitted; fractions are computed from the sum of the rest."
  palette:
    tokens: "--tree-color-chart-1 … --tree-color-chart-8"
    rule: "Series/segments auto-assign these in order (cycling after 8). A per-series `color` overrides. Never map color to rank — keep a series' color stable when the set changes."
  value_format:
    prop: valueFormat
    type: "(value: number) => string"
    used_by: [TChart, TDonutChart]
    default: "Locale-grouped integers for |value| >= 1000, raw otherwise."
  accessibility:
    - "TChart renders a visually-hidden <table> mirror of the series data; the SVG is aria-hidden."
    - "TSparkline and TDonutChart expose role=img with an aria-label (auto-generated, overridable)."
    - "A legend is shown by default for >= 2 series/segments so identity never relies on color alone."
    - "Entrance animation is gated behind prefers-reduced-motion."

overlay_contract:
  props:
    - open
    - defaultOpen
  events:
    - update:open
    - open-change
  rule: "controlled and uncontrolled modes should behave the same from the outside"

form_contract:
  props:
    - modelValue
  events:
    - update:modelValue

responsive_contract:
  props:
    - mobile
    - breakpoint
  used_by:
    - TAppShell
  rule: "`mobile` is an optional boolean override; when left undefined the component derives the mode from `breakpoint` (a CSS max-width). An explicit `mobile` value always wins over the breakpoint."

accessibility_baseline:
  focus_visible: true
  keyboard_support: true
  semantic_markup: true
  disabled_state_clarity: true
  loading_state_clarity: true
  screen_reader_labels_when_needed: true

notes:
  - "Use T<Name> in examples, docs, and code. There are no Tree<Name> aliases."
  - "Do not introduce Vue-specific naming into tokens or design contracts."

version: 0.1
package: "@treeui/vue"
public_component_prefix: "T"
legacy_component_prefix: "Tree"
legacy_alias_status: "compatibility_only"
source_component_filename_prefix: "Tree"

primary_exports:
  - TAlert
  - TBadge
  - TBreadcrumb
  - TBreadcrumbItem
  - TButton
  - TCard
  - TCheckbox
  - TCombobox
  - TConfirmDialog
  - TDatePicker
  - TDropdown
  - TDrawer
  - TEmptyState
  - TFileUpload
  - TFormField
  - TInput
  - TModal
  - TRadio
  - TRadioGroup
  - TSelect
  - TSkeleton
  - TSpinner
  - TSwitch
  - TTabs
  - TTabList
  - TTab
  - TTabPanel
  - TToast
  - TToastProvider
  - TTooltip
  - TAvatar
  - TDivider
  - TTable
  - TTag
  - TTimeline
  - TLink

compatibility_aliases:
  TAlert: TreeAlert
  TBadge: TreeBadge
  TBreadcrumb: TreeBreadcrumb
  TBreadcrumbItem: TreeBreadcrumbItem
  TButton: TreeButton
  TCard: TreeCard
  TCheckbox: TreeCheckbox
  TCombobox: TreeCombobox
  TConfirmDialog: TreeConfirmDialog
  TDatePicker: TreeDatePicker
  TDropdown: TreeDropdown
  TDrawer: TreeDrawer
  TEmptyState: TreeEmptyState
  TFileUpload: TreeFileUpload
  TFormField: TreeFormField
  TInput: TreeInput
  TModal: TreeModal
  TRadio: TreeRadio
  TRadioGroup: TreeRadioGroup
  TSelect: TreeSelect
  TSkeleton: TreeSkeleton
  TSpinner: TreeSpinner
  TSwitch: TreeSwitch
  TTabs: TreeTabs
  TTabList: TreeTabList
  TTab: TreeTab
  TTabPanel: TreeTabPanel
  TToast: TreeToast
  TToastProvider: TreeToastProvider
  TTooltip: TreeTooltip
  TAvatar: TreeAvatar
  TDivider: TreeDivider
  TTable: TreeTable
  TTag: TreeTag
  TTimeline: TreeTimeline
  TLink: TreeLink

shared_sizes:
  values: [sm, md, lg]
  used_by:
    - TBadge
    - TButton
    - TCard
    - TCombobox
    - TConfirmDialog
    - TDatePicker
    - TDropdown
    - TEmptyState
    - TFileUpload
    - TFormField
    - TInput
    - TSelect
    - TTextarea
    - TModal
    - TSpinner
    - TSwitch
    - TTimeline
    - TTabs

shared_variants:
  action_values: [solid, outline, ghost, soft, danger]
  card_values: [outline, soft, solid, inset]

shared_props:
  variant:
    used_by: [TBadge, TButton, TCard]
  size:
    used_by: [TBadge, TButton, TCard, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TModal, TRadio, TRadioGroup, TSelect, TSpinner, TTextarea, TTimeline]
  disabled:
    used_by: [TButton, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TModal, TRadio, TRadioGroup, TSelect, TSwitch, TTextarea, TTooltip]
  loading:
    used_by: [TButton, TCombobox, TConfirmDialog, TFileUpload, TInput, TSelect, TTextarea]
  as:
    used_by: [TButton, TCard]
  class:
    status: "supported via standard Vue attrs when relevant"

shared_events:
  update:modelValue:
    used_by: [TCheckbox, TCombobox, TDatePicker, TFileUpload, TInput, TRadioGroup, TSelect, TSwitch, TTextarea]
  update:open:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TModal, TSelect, TTooltip]
  open-change:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TModal, TSelect, TTooltip]

shared_slots:
  default:
    used_by: [TBadge, TButton, TCard, TConfirmDialog, TFileUpload, TInput, TModal, TTooltip]
  icon:
    used_by: [TBadge, TButton, TFileUpload]
  prefix:
    used_by: [TCombobox, TDatePicker, TInput]
  suffix:
    used_by: [TDatePicker, TInput]
  trigger:
    used_by: [TConfirmDialog, TDrawer, TModal, TTooltip]
  content:
    used_by: [TDrawer, TModal, TTooltip]
  header:
    used_by: [TCard, TDrawer, TModal]
  footer:
    used_by: [TCard, TDrawer, TModal]

value_formats:
  date: "YYYY-MM-DD"

overlay_contract:
  props:
    - open
    - defaultOpen
  events:
    - update:open
    - open-change
  rule: "controlled and uncontrolled modes should behave the same from the outside"

form_contract:
  props:
    - modelValue
  events:
    - update:modelValue

accessibility_baseline:
  focus_visible: true
  keyboard_support: true
  semantic_markup: true
  disabled_state_clarity: true
  loading_state_clarity: true
  screen_reader_labels_when_needed: true

notes:
  - "Prefer T<Name> in examples, docs, and new code."
  - "Keep Tree<Name> only for migration compatibility."
  - "Do not introduce Vue-specific naming into tokens or design contracts."

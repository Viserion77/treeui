export_aliases:
  note: "Two exports are aliases of the same component, not separate components. Counted individually above."
  pairs:
    - canonical: TNavbar
      alias: TAppBar
    - canonical: TSteps
      alias: TStepper

layout_capabilities_already_shipping:
  note: >
    Layout sizing and flex behavior already exist as dedicated primitives. Reach
    for these before adding `fill`, `grow`, `flex`, or width props to individual
    components — that capability is composed, not duplicated per component.
  TStackItem:
    props: [grow, shrink, basis, minWidth, align]
    purpose: >
      Per-child flex control inside a TStack. `grow` makes one child absorb the
      free space; `minWidth` is the standard fix for a flex child that refuses to
      shrink below its content.
  TStack:
    purpose: "One-dimensional layout — direction, gap, align, justify, wrap."
  TSplit:
    purpose: "Two-region row that pushes the second region to the far edge."
  TSpacer:
    purpose: "Flexible gap that absorbs free space between siblings."
  TGrid:
    purpose: "Responsive multi-column layout."
  TContainer:
    purpose: "Max-width constraint and horizontal page padding."
  TPage:
    purpose: "Page region: width constraint plus block padding and vertical rhythm."

shared_sizes:
  values: [sm, md, lg]
  used_by:
    - TBadge
    - TButton
    - TCard
    - TCombobox
    - TConfirmDialog
    - TDatePicker
    - TDropdown
    - TEmptyState
    - TFileUpload
    - TFlag
    - TFormField
    - TInput
    - TLanguageSelect
    - TSelect
    - TTextarea
    - TModal
    - TSpinner
    - TSwitch
    - TTimeline
    - TTabs

shared_variants:
  action_values: [solid, outline, ghost, soft, danger]
  card_values: [outline, soft, inset]
  card_values_note: >
    Card variants are a surface scale (plain → tinted → recessed), a different
    axis from the action variants above. `solid` is deliberately absent: it is
    an action variant only. See DECISIONS.md → "Variant Vocabulary".
  button_extra_values:
    values: [brand]
    note: "TButton adds a high-emphasis `brand` gradient variant (via `--tree-gradient-brand`) on top of the shared action values. It is button-only, not a shared action variant."

shared_props:
  variant:
    used_by: [TBadge, TButton, TCard]
  tone:
    used_by: [TBadge, TStat]
  size:
    used_by: [TBadge, TButton, TCard, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TFlag, TInput, TLanguageSelect, TModal, TRadio, TRadioGroup, TSelect, TSpinner, TTextarea, TTimeline]
  width:
    used_by: [TInput, TLanguageSelect, TSelect, TTextarea]
    values: [xs, sm, md, lg, xl, full]
    default: full
    note: >-
      Inline-size scale for form controls (type `TFieldWidth`). Controls are
      fluid by default; the other steps set a `max-inline-size` cap so they
      still shrink on narrow containers. Prefer this over inline width styles.
      Caps: xs 8rem, sm 12rem, md 18rem, lg 24rem, xl 32rem.
  disabled:
    used_by: [TButton, TCheckbox, TCombobox, TConfirmDialog, TDatePicker, TDropdown, TFileUpload, TInput, TLanguageSelect, TModal, TRadio, TRadioGroup, TSelect, TSwitch, TTextarea, TTooltip]
  loading:
    used_by: [TButton, TCombobox, TConfirmDialog, TFileUpload, TInput, TLanguageSelect, TSelect, TTextarea, TChart, TDonutChart]
    note: >-
      loading conveys busy state. On single action controls (TButton, TConfirmDialog)
      it also disables that one control to prevent double submission. On form value
      controls (TFileUpload, TInput, TSelect, TTextarea, TCombobox, TLanguageSelect) it is
      presentational only and must never gate interaction.
  as:
    used_by: [TButton, TCard]
  icon:
    type: TIconInput
    type_definition: >-
      `TIconInput = TIconName | Component` — a registered icon name, or a
      component supplied by the application. Exported from `@treeui/icons` and
      re-exported from `@treeui/vue`.
    used_by: [TNavMenu]
    used_by_note: >-
      As the `icon` field of a `TNavMenuItem` — and that is the ONLY prop or item
      field in the library that takes an icon as a value. Components that show an
      icon elsewhere (TAlert, TBadge, TButton, TConfirmDialog, TEmptyState,
      TFileUpload, TStat, TTag) expose an `#icon` SLOT and have no `icon` prop;
      `TIcon` takes `name: TIconName`, a registry name only, never a component.
      The shared rule is therefore about typing, not reach: where a value-shaped
      icon exists it is `TIconInput`, never `Component` alone. A name needs no
      import, and — being a string — is never made reactive, so it survives a
      `ref`/`reactive` item list, an API response, or a route definition without
      `markRaw`.
    resolution:
      - >-
        Names are resolved centrally, never per component: `resolveTreeIcon(icon)`
        maps a name OR a component to a component. A template must call it before
        `<component :is>`, because Vue resolves a raw string `is` as a globally
        registered component name — passing `"cpu"` straight through renders
        nothing.
      - >-
        `TIcon` is the render path for a standalone icon. Its `name` prop is a
        `TIconName` (registry names only); when the app holds a component rather
        than a name, pass it to an `icon` prop or render it in a slot.
      - >-
        An unknown name resolves to `undefined` and logs a warning listing the
        valid names — once per name, and in production builds as well as dev.
        Consumers degrade rather than break — `TNavMenu` falls back to its letter
        marker.
      - >-
        Components are built lazily on first lookup and cached, so an icon nobody
        renders stays as geometry instead of becoming a component. That is a
        construction saving, not a bundle one: the built-in geometry is held in a
        module-scope `Map`, so it is retained by any import of the package.
    registry:
      - >-
        Names come from `TIconRegistry`, an augmentable interface;
        `TIconName = keyof TIconRegistry & string`. Apps widen it with
        `declare module '@treeui/icons'` — see SETUP.yaml → `icons`.
      - >-
        `registerTreeIcons(icons: Record<string, TIconDefinition>)` adds icons,
        where `TIconDefinition = TIconNodes | Component`. `hasTreeIcon(name)`
        tests one, `listTreeIcons()` returns all sorted names, `treeIcons` is a
        lazy name → component map, and `builtinTreeIconNodes` is the shipped
        GEOMETRY by name (`Record<string, TIconNodes>` — data, not components).
      - >-
        Registering one of the 364 built-in names replaces that built-in for the
        whole process and does not warn. Additions must use a name TreeUI does
        not ship; replacement is supported but has to be intentional.
      - >-
        `resetTreeIcons()` restores the registry to what TreeUI ships and drops
        everything registered since. The registry is process-wide mutable state
        (anchored on a `Symbol.for` global so duplicate package copies share it),
        so tests that register icons must call it in an `afterEach`.
      - >-
        Individual icons are NOT exported as named imports. The registry is the
        public surface; there is no `import { Cpu } from '@treeui/icons'`.
      - >-
        Author custom geometry with `createTreeIcon(name, nodes)`, never a
        hand-rolled `<svg>`. Icons draw on a 24-unit viewBox at a pixel `size`,
        so painted stroke = attribute × size / 24. `absoluteStrokeWidth` sets the
        attribute to `(strokeWidth * 24) / size`, cancelling the scale and
        painting a constant 2px at every size; a hand-rolled `stroke-width="2"`
        paints 1.67px at 20, 2.67px at 32 and 4px at 48, so it grows heavier as
        the icon grows. `createTreeIcon` also supplies the `size` / `strokeWidth`
        props and the `aria-hidden` default.
  class:
    status: "supported via standard Vue attrs when relevant"

shared_events:
  update:modelValue:
    used_by: [TCheckbox, TCombobox, TDatePicker, TFileUpload, TInput, TLanguageSelect, TRadioGroup, TSelect, TSwitch, TTextarea]
  update:open:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TLanguageSelect, TModal, TSelect, TTooltip]
  open-change:
    used_by: [TCombobox, TConfirmDialog, TDatePicker, TDrawer, TDropdown, TLanguageSelect, TModal, TSelect, TTooltip]

shared_slots:
  default:
    used_by: [TBadge, TButton, TCard, TConfirmDialog, TFileUpload, TInput, TModal, TTooltip]
  icon:
    used_by: [TAlert, TBadge, TButton, TConfirmDialog, TEmptyState, TFileUpload, TStat, TTag]
    note: >-
      A slot named `icon` takes rendered content — put a `TIcon` (or any
      element) inside it. None of these components has an `icon` PROP; the slot
      is the entire interface, so `<TButton icon="plus">` is not a thing. The one
      prop-shaped icon in the library is `TNavMenuItem.icon`, typed `TIconInput`;
      see shared_props → icon.
  prefix:
    used_by: [TCombobox, TDatePicker, TInput, TLanguageSelect]
  suffix:
    used_by: [TDatePicker, TInput]
  trigger:
    used_by: [TConfirmDialog, TDrawer, TModal, TTooltip]
  content:
    used_by: [TDrawer, TModal, TTooltip]
  header:
    used_by: [TCard, TDrawer, TModal]
  footer:
    used_by: [TCard, TDrawer, TModal]

value_formats:
  date: "YYYY-MM-DD"

dataviz_contract:
  components: [TChart, TSparkline, TDonutChart]
  engine: "Pure geometry helpers live in @treeui/utils (niceScale, linearScale, buildLinePath, buildAreaPath, donutSegments) — framework-agnostic and reusable from React."
  series_shape:
    used_by: [TChart]
    type: "{ name: string; data: number[]; color?: string }"
    note: "Each series' `data` is aligned index-for-index to the `labels` array."
  segment_shape:
    used_by: [TDonutChart]
    type: "{ label: string; value: number; color?: string }"
    note: "Non-positive `value`s are omitted; fractions are computed from the sum of the rest."
  palette:
    tokens: "--tree-color-chart-1 … --tree-color-chart-8"
    rule: "Series/segments auto-assign these in order (cycling after 8). A per-series `color` overrides. Never map color to rank — keep a series' color stable when the set changes."
  value_format:
    prop: valueFormat
    type: "(value: number) => string"
    used_by: [TChart, TDonutChart]
    default: "Locale-grouped integers for |value| >= 1000, raw otherwise."
  accessibility:
    - "TChart renders a visually-hidden <table> mirror of the series data; the SVG is aria-hidden."
    - "TSparkline and TDonutChart expose role=img with an aria-label (auto-generated, overridable)."
    - "A legend is shown by default for >= 2 series/segments so identity never relies on color alone."
    - "Entrance animation is gated behind prefers-reduced-motion."

overlay_contract:
  props:
    - open
    - defaultOpen
  events:
    - update:open
    - open-change
  rule: "controlled and uncontrolled modes should behave the same from the outside"

form_contract:
  props:
    - modelValue
  events:
    - update:modelValue

responsive_contract:
  props:
    - mobile
    - breakpoint
  used_by:
    - TAppShell
  rule: "`mobile` is an optional boolean override; when left undefined the component derives the mode from `breakpoint` (a CSS max-width). An explicit `mobile` value always wins over the breakpoint."

accessibility_baseline:
  focus_visible: true
  keyboard_support: true
  semantic_markup: true
  disabled_state_clarity: true
  loading_state_clarity: true
  screen_reader_labels_when_needed: true

notes:
  - "Use T<Name> in examples, docs, and code. There are no Tree<Name> aliases."
  - "Do not introduce Vue-specific naming into tokens or design contracts."

version: 0.1
package: "@treeui/vue"
public_component_prefix: "T"
source_component_filename_prefix: "T"

# Every component value exported from packages/vue/src/components/index.ts.
# This list is the canonical answer to "does TreeUI already have X?" — check it
# before proposing a new component or a new prop, because a capability that
# already ships here is not missing, only undocumented.
# Maintenance: must stay 1:1 with the `export { default as ... }` lines in
# packages/vue/src/components/index.ts. Verify with:
#   grep -oP '^export \{ default as \K\w+' packages/vue/src/components/index.ts | sort
primary_exports_count: 77
primary_exports:
  - TAccordion
  - TAccordionItem
  - TAlert
  - TAppBar
  - TAppShell
  - TAvatar
  - TBadge
  - TBreadcrumb
  - TBreadcrumbItem

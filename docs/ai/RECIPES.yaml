version: 0.1
package: "@treeui/vue"

recipes:
  - id: form-field-input
    name: "Field with text input"
    use_when:
      - "A form control needs label, hint, and validation messaging."
    compose:
      - TFormField
      - TInput
    notes:
      - "Match `htmlFor` on `TFormField` with the child `id`."
      - "Mirror invalid state onto `TInput` when error text is shown."

  - id: searchable-multi-choice
    name: "Searchable multi-choice field"
    use_when:
      - "A form needs compact multi-select with filtering."
    compose:
      - TFormField
      - TMultiSelect
    notes:
      - "Pass option keywords when search should match hidden synonyms."
      - "Use `maxVisibleTags` to avoid oversized triggers."

  - id: date-range-form
    name: "Scheduling pair"
    use_when:
      - "A form needs start and end scheduling controls."
    compose:
      - TGrid
      - TFormField
      - TDateTimePicker
    notes:
      - "Keep both values in `YYYY-MM-DDTHH:mm` format."
      - "Set end `min` from the selected start time when appropriate."

  - id: app-shell
    name: "Full-viewport application shell"
    use_when:
      - "The app needs a header plus side navigation that fills the whole screen and adapts to mobile."
      - "The layout must use the full page width on large monitors, not a centered column."
    compose:
      - TAppShell
      - TNavMenu
    notes:
      - "`TAppShell` orchestrates the header, sidebar, and fluid content in one component; put a `TNavMenu` in its `sidebar` slot and it inherits collapsed state automatically."
      - "Leave `mobile` unset to auto-switch at `breakpoint` (default 768px), or bind it to force mobile; the sidebar becomes an off-canvas drawer with a header menu button."
      - "Mount it at the app root. Wrap only inner regions in `TContainer` if a specific area needs a constrained reading width."

  - id: sidebar-shell
    name: "Sidebar application shell"
    use_when:
      - "The screen needs persistent section navigation and you are composing the shell by hand."
    compose:
      - TSidebar
      - TNavMenu
      - TNavbar
      - TContainer
    notes:
      - "Let `TNavMenu` inherit collapsed state from `TSidebar` when possible."
      - "Prefer `TAppShell` (recipe `app-shell`) when you also need full-viewport sizing and a responsive mobile drawer."

  - id: nav-menu-icons
    name: "Icons on navigation items"
    use_when:
      - "Navigation items each carry an icon."
      - "The navigation collapses to an icon-only rail, so the icon is the only thing left identifying a section."
      - "Some of the icons the app needs are not TreeUI built-ins."
    compose:
      - TNavMenu
      - TIcon
      - registerTreeIcons
      - resetTreeIcons
    notes:
      - "Set `icon` on the item, as a registered NAME: `{ label: 'Dashboard', value: 'dashboard', icon: 'layout-dashboard' }`. Do not import an icon component per item, and do not put a `TIcon` in the `#item` slot just to get an icon — the item renders it for you."
      - "`TNavMenuItem.icon` is `TIconInput`, so a component is accepted too. Prefer the name: `items` normally lives in a `ref`, a `computed`, or a route config, and a string is never made reactive — a component object there needs `markRaw` or Vue warns."
      - "An item with no icon (or an unregistered name) falls back to a letter marker, and a `console.warn` lists the valid names — once per name, in production builds too. Give every item an icon before shipping a collapsible rail, or the collapsed state is a column of letters."
      - "Icons the app needs but TreeUI does not ship are REGISTERED, not worked around: one `registerTreeIcons` call in `main.ts` and they are usable by name everywhere. Never hand-roll an `<svg>` — without the `absoluteStrokeWidth` correction its stroke scales with the icon (1.67px at size 20, 4px at 48), so it looks bolder than its neighbours at every size above 24."
      - "Check the name is not already taken before registering it — `hasTreeIcon(name)` answers that. Registering one of the 364 built-in names replaces that built-in everywhere, silently, which is a supported swap but never what you want when the goal was adding an icon."
      - "Keep the icon vocabulary consistent: built-ins use TreeUI's descriptive kebab-case names, so register custom ones with the same convention."
      - "Icon registration is process-wide state. In component tests that register icons, call `resetTreeIcons()` in an `afterEach` so one case's icons do not leak into the next."
      - "Set `to` for the route target on each item — `TNavMenuItem` has no `href` and no `id`; identity is `value`."
      - "This recipe covers the icons only; the surrounding layout is its own recipe (`app-shell` or `sidebar-shell`)."
    example: |
      // main.ts — register the icons this app needs, once, before mount
      import { createApp } from 'vue';
      import TreeUIPlugin, { registerTreeIcons } from '@treeui/vue';
      import '@treeui/vue/style.css';
      import App from './App.vue';

      // `deployment-pipeline` is not a built-in; `server`, `users`, `settings`, and
      // `layout-dashboard` below already ship, so they need no registration.
      registerTreeIcons({
        'deployment-pipeline': [
          ['rect', { x: 3, y: 3, width: 7, height: 7, rx: 1.5 }],
          ['rect', { x: 14, y: 14, width: 7, height: 7, rx: 1.5 }],
          ['path', { d: 'M10 6.5h4a2 2 0 0 1 2 2V14' }],
        ],
      });

      createApp(App).use(TreeUIPlugin).mount('#app');
    example_template: |
      <script setup lang="ts">
      import { ref } from 'vue';
      import { TAppShell, TNavMenu, type TNavMenuItem } from '@treeui/vue';

      // Plain strings: no icon imports, no markRaw, safe inside a ref.
      const items = ref<TNavMenuItem[]>([
        { label: 'Dashboard', value: 'dashboard', icon: 'layout-dashboard', to: '/' },
        { label: 'Services',  value: 'services',  icon: 'server',  to: '/services' },
        { label: 'Pipelines', value: 'pipelines', icon: 'deployment-pipeline', to: '/pipelines' }, // registered above
        { label: 'Team',      value: 'team',      icon: 'users',    to: '/team', badge: 3 },
        { label: 'Settings',  value: 'settings',  icon: 'settings', to: '/settings' },
      ]);

      const section = ref('dashboard');
      const collapsed = ref(false);
      </script>

      <template>
        <TAppShell v-model:collapsed="collapsed">
          <template #sidebar>
            <!-- collapsed state is inherited from the shell; icons carry the rail -->
            <TNavMenu v-model="section" :items="items" />
          </template>
          <RouterView />
        </TAppShell>
      </template>

  - id: stat-grid
    name: "Dashboard metric grid"
    use_when:
      - "A dashboard needs KPI cards."
    compose:
      - TGrid
      - TStat
    notes:
      - "Use `TCard` only when the stat needs additional arbitrary content."

  - id: color-field
    name: "Color field"
    use_when:
      - "A form needs a color selection control without adding a dedicated TreeUI component."
    compose:
      - TFormField
      - native input[type="color"]
    notes:
      - "Wrap the native color input with `TFormField` for label, hint, and error handling."

  - id: tag-input
    name: "Tag input field"
    use_when:
      - "A form needs freeform tag entry such as domains, labels, or emails."
    compose:
      - TFormField
      - TInput
      - TTag
      - TStack
    notes:
      - "Keep the draft value in app state and add a tag on Enter or separator keys."
      - "Use removable `TTag` items below or inside the field wrapper."

  - id: data-listing
    name: "Data table with paging"
    use_when:
      - "A structured list needs external paging controls."
    compose:
      - TTable
      - TPagination
      - TStack
    notes:
      - "`TTable` stays focused on structured listing; filters and toolbars compose around it."
      - "Use `#cell-{key}` slots when a column renders derived or rich content."

  - id: router-backed-tabs
    name: "Router-backed tabs"
    use_when:
      - "Tabs should deep-link to app state without turning into primary route navigation."
    compose:
      - TTabs
      - app router state
    notes:
      - "Bind `v-model` to a route param, query param, or derived route name in the app layer."
      - "Prefer `TNavMenu` when the selection becomes app-section navigation instead of in-place panel switching."

  - id: confirm-destructive-action
    name: "Destructive confirmation flow"
    use_when:
      - "The user is confirming a high-risk action."
    compose:
      - TConfirmDialog
      - TButton
      - TToast
    notes:
      - "Use `TToast` only for the post-confirm success feedback."

  - id: chart-surface
    name: "Chart surface"
    use_when:
      - "A screen needs data visualization inside a framed, titled surface."
    compose:
      - TCard
      - TStack
      - TChart
      - TSelect
    notes:
      - "Prefer the native TChart / TDonutChart / TSparkline — no external charting library is required."
      - "Use TreeUI for the surrounding surface, headings, badges, range filters, and empty/loading states."
      - "TChart has its own loading and empty slots; you can still wrap it in TCard for the frame."
      - "Only reach for an external chart engine for chart types TreeUI does not cover yet (e.g. scatter, heatmap)."

  - id: metric-dashboard
    name: "Metric dashboard"
    use_when:
      - "A dashboard shows KPIs alongside trends and breakdowns."
    compose:
      - TStat
      - TSparkline
      - TChart
      - TDonutChart
      - TGrid
    notes:
      - "Lead with TStat tiles; embed a TSparkline in a stat's meta slot for the inline trend."
      - "Use one TChart for the main time series and a TDonutChart for a part-of-whole split."
      - "Keep series colors stable across the dashboard — rely on the --tree-color-chart-* order, do not remap by rank."

  - id: anchored-help
    name: "Anchored help affordance"
    use_when:
      - "A trigger needs short or medium contextual help."
    compose:
      - TTooltip
      - TPopover
    notes:
      - "Use `TTooltip` for short, non-interactive help."
      - "Escalate to `TPopover` when the content becomes interactive."

  - id: pricing-section
    name: "Pricing comparison section"
    use_when:
      - "Plans should be compared side by side."
    compose:
      - TPricing
      - TPricingCard
      - TBadge
      - TButton
    notes:
      - "Use `highlighted` and `badge` on the recommended plan."

  - id: hierarchy-picker
    name: "Hierarchical selection"
    use_when:
      - "Selection works across nested groups or folders."
    compose:
      - TTreeView
      - TFormField
    notes:
      - "Use `selectionMode=\"multiple\"` when permissions or tag assignment spans nested nodes."

  - id: language-switcher
    name: "Application language switcher"
    use_when:
      - "The app lets the user pick a language or locale, with an optional flag per option."
    compose:
      - TFormField
      - TLanguageSelect
    notes:
      - "The app owns the language list: TreeUI ships no locale dataset, so pass `options` with your own `label`, `value`, and optional `code` and `description`."
      - "`TLanguageSelect` only emits the chosen `value` through `update:modelValue`; the app performs every locale side effect (i18n locale, persistence, `document.documentElement.lang`, route or API updates)."
      - "Set `code` only where a flag is meaningful — a language is not a country — and omit it to render that option without a flag."
      - "Set `flagBaseUrl` once, at the switcher, when flag assets are self-hosted; it is forwarded to every nested `TFlag`."
      - "Wrap with `TFormField` when the switcher sits in a form and needs a label, hint, or error text; drop the wrapper for a bare toolbar or header control."

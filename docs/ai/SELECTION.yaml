version: 0.1
package: "@treeui/vue"

selection_principles:
  - "Prefer the smallest component that matches the interaction and accessibility need."
  - "Use `T<Name>` exports. There are no `Tree<Name>` aliases."
  - "Prefer docs-first composition before inventing new public components."
  - "When a component has an in-flow and overlay alternative, choose the in-flow one unless anchored or modal behavior is required."

decision_guides:
  - id: single-choice
    question: "Choose one value from a known set"
    options:
      - use: TToggleGroup
        when:
          - "The number of options is small and should stay visible."
          - "Fast switching matters more than compactness."
      - use: TSelect
        when:
          - "The choices can stay in a dropdown."
          - "Search is not required."
      - use: TCombobox
        when:
          - "The user needs filtering or type-to-search."
          - "The option list can become long."
      - use: TRadioGroup
        when:
          - "All options should be visible with classic form semantics."
          - "You need explicit radio semantics in a form."
      - use: TSelectableList
        when:
          - "The choice should be presented as richer rows with description or metadata."
      - use: TTreeView
        when:
          - "The options are hierarchical."
      - use: TLanguageSelect
        when:
          - "The value is the application language or locale."
          - "Each language should show a country flag beside its name."

  - id: multiple-choice
    question: "Choose multiple values"
    options:
      - use: TMultiSelect
        when:
          - "Selected values should collapse into tags."
          - "The user needs filtering and a compact control."
      - use: TToggleGroup
        when:
          - "The option set is small and visible."
          - "A segmented-control style is appropriate."
        notes:
          - "Set `selectionMode=\"multiple\"`."
      - use: TCheckbox
        when:
          - "The options can stay visible as a checklist."
      - use: TTreeView
        when:
          - "Multi-selection must work across a hierarchy."
          - "Set `selectionMode=\"multiple\"`."

  - id: overlay-choice
    question: "Show contextual or blocking UI above the page"
    options:
      - use: TTooltip
        when:
          - "The content is a short label or hint."
          - "The panel should not be interactive."
      - use: TPopover
        when:
          - "The content is anchored, custom, and non-blocking."
          - "The panel can contain controls."
      - use: TDropdown
        when:
          - "You need a lightweight action menu or menu-like list."
      - use: TContextMenu
        when:
          - "The menu is triggered by right click or context action."
      - use: TDrawer
        when:
          - "The task needs a larger side panel but should keep page context visible."
      - use: TModal
        when:
          - "The task is blocking and requires focused attention."
      - use: TConfirmDialog
        when:
          - "The user is confirming or canceling a destructive or high-risk action."

  - id: navigate-or-act
    question: "Navigate somewhere vs. perform an action"
    rule: "Decide by what the control does, not by how it looks. Navigation is a link; everything else is a button."
    options:
      - use: TLink
        when:
          - "Activating it changes the URL — an external link, a route, or an in-page anchor."
          - "It should be openable in a new tab, copyable, and crawlable."
      - use: TButton
        when:
          - "Activating it runs behavior on the current page — submit, open an overlay, delete, toggle."
          - "It needs sizes, action variants, or a loading state."
        notes:
          - "Use `variant=\"ghost\"` when an action needs to look understated like a link."
      - use: TNavMenu
        when:
          - "The links are app-section navigation inside a shell or sidebar."
      - use: TBreadcrumb
        when:
          - "The links express where the current page sits in a hierarchy."

  - id: feedback-choice
    question: "Communicate status or feedback"
    options:
      - use: TAlert
        when:
          - "The message should stay visible in the page layout."
      - use: TToast
        when:
          - "The message is ephemeral and should not shift layout."
          - "A root `TToastProvider` is already mounted."
      - use: TEmptyState
        when:
          - "The user needs a purposeful zero-state, not only a status message."
      - use: TProgress
        when:
          - "You need a determinate progress indicator."
      - use: TSpinner
        when:
          - "You need indeterminate loading feedback."
      - use: TSkeleton
        when:
          - "You want loading placeholders that preserve layout."

  - id: data-viz-choice
    question: "Visualize numeric data"
    options:
      - use: TStat
        when:
          - "The story is a single headline number, optionally with a trend and delta."
          - "It is not a plot — prefer the number over a chart when one value says it."
      - use: TSparkline
        when:
          - "You want an inline micro-trend next to a value, in a table cell, or in text."
          - "No axes, legend, or tooltip are needed."
      - use: TChart
        when:
          - "You need line, area, or bar plots with axes, gridlines, legend, and hover tooltip."
          - "There are one or more series over shared categories."
      - use: TDonutChart
        when:
          - "The data is a part-of-whole breakdown (donut or pie)."
      - use: TProgress
        when:
          - "You are showing completion toward a single target, not a distribution or trend."

component_profiles:
  TAccordion:
    keywords: [accordion, collapsible, disclosure, details, faq]
    use_when:
      - "Sections expand and collapse inside the page flow."
      - "Multiple disclosure items share one layout."
    avoid_when:
      - "You need tabbed navigation or route-level navigation."
    alternatives:
      - component: TTabs
        when: "Only one panel should be active and the tab labels must stay visible."
      - component: TTreeView
        when: "The content is hierarchical rather than just collapsible."

  TAlert:
    keywords: [alert, banner, callout, inline feedback, status]
    use_when:
      - "Feedback should stay visible in-flow."
      - "The message may contain actions or supporting content."
    avoid_when:
      - "The feedback should disappear automatically."
    alternatives:
      - component: TToast
        when: "The message is ephemeral and should not affect layout."
      - component: TEmptyState
        when: "The screen has no data and needs stronger guidance."

  TAppShell:
    keywords: [app shell, layout, dashboard, admin, header sidebar, full screen, responsive shell, off-canvas]
    use_when:
      - "You need a full-viewport application layout with a header, a side navigation, and a fluid content area."
      - "The layout should use the entire page width (not a centered max-width) and switch the sidebar to an off-canvas drawer on small screens."
    avoid_when:
      - "You only need one region (just a top bar, or just a side rail) — compose TNavbar or TSidebar directly."
      - "The page content should be centered with a readable max width — use TContainer inside the shell content instead."
    alternatives:
      - component: TSidebar
        when: "You want a standalone collapsible side rail without the header/content orchestration or responsive drawer."
      - component: TNavbar
        when: "You only need the top application bar."
      - component: TDrawer
        when: "You need a general temporary overlay panel rather than the shell's responsive navigation."

  TCard:
    keywords: [card, panel, surface, section]
    use_when:
      - "You need a framed surface for related content."
      - "The layout can be composed from slots instead of a dedicated domain component."
    avoid_when:
      - "You only need width constraint or spacing."
    alternatives:
      - component: TContainer
        when: "The main need is width constraint."
      - component: TStack
        when: "The main need is spacing between children."

  TChart:
    keywords: [chart, graph, line chart, area chart, bar chart, plot, dashboard, time series, analytics]
    use_when:
      - "You need a line, area, or bar chart with axes, gridlines, legend, and a hover tooltip."
      - "One or more series share a set of category labels."
    avoid_when:
      - "A single value tells the story — use TStat."
      - "You only need an inline trend with no axes — use TSparkline."
      - "The data is a part-of-whole breakdown — use TDonutChart."
    alternatives:
      - component: TSparkline
        when: "The trend should be inline and axis-less."
      - component: TDonutChart
        when: "The data is proportional (parts of a whole)."

  TCheckbox:
    keywords: [checkbox, checklist, boolean, consent, multiple choice]
    use_when:
      - "Each option is independent."
      - "You need standard checkbox form semantics."
    avoid_when:
      - "Exactly one option must be selected."
    alternatives:
      - component: TRadioGroup
        when: "Only one option is valid."
      - component: TSwitch
        when: "The choice is a single immediate on/off state."

  TCombobox:
    keywords: [combobox, autocomplete, searchable select, search select]
    use_when:
      - "The user needs to filter or search a single-choice list."
      - "A dropdown is appropriate, but plain select is too limited."
    avoid_when:
      - "Search is unnecessary and the option list is short."
    alternatives:
      - component: TSelect
        when: "You only need a standard dropdown without filtering."
      - component: TMultiSelect
        when: "The user must select multiple values."

  TContainer:
    keywords: [container, page width, centered content, shell]
    use_when:
      - "You want consistent max width and horizontal page padding."
      - "The page shell should stay full-width while content stays readable."
    avoid_when:
      - "You need internal spacing between children."
      - "You are laying out a whole screen — reach for TPage, which adds page padding and vertical rhythm."
    alternatives:
      - component: TPage
        when: "You want a full page region with block padding and vertical spacing between sections, not just a width constraint."
      - component: TStack
        when: "The main need is vertical or horizontal spacing."
      - component: TGrid
        when: "The main need is responsive columns."

  TContextMenu:
    keywords: [context menu, right click, row actions]
    use_when:
      - "Actions are triggered from context-click or long-press style behavior."
    avoid_when:
      - "The menu is triggered from a standard button."
    alternatives:
      - component: TDropdown
        when: "A normal trigger button opens the menu."

  TDatePicker:
    keywords: [date, calendar, single day]
    use_when:
      - "The value is a date without time."
    avoid_when:
      - "Time selection matters."
    alternatives:
      - component: TDateTimePicker
        when: "The value must include time."

  TDateTimePicker:
    keywords: [datetime, schedule, appointment, release window]
    use_when:
      - "The value must include both date and time."
      - "The user should pick a schedule from one compact control."
    avoid_when:
      - "Only a day is needed."
    alternatives:
      - component: TDatePicker
        when: "Only the date matters."

  TDonutChart:
    keywords: [donut, doughnut, pie, proportion, share, breakdown, part of whole, percentage]
    use_when:
      - "You are showing how a total splits into a handful of categories."
      - "A donut center readout (total or hovered slice) is useful."
    avoid_when:
      - "There are many categories or precise comparison matters — use TChart bars."
      - "The data is a trend over time — use TChart or TSparkline."
    alternatives:
      - component: TChart
        when: "Precise magnitude comparison across categories is needed (bars)."

  TDrawer:
    keywords: [drawer, side panel, slide-over]
    use_when:
      - "The user needs a larger contextual panel while keeping page context visible."
    avoid_when:
      - "The task requires full modal focus or only a small anchored panel."
    alternatives:
      - component: TModal
        when: "The task should be fully blocking."
      - component: TPopover
        when: "A compact anchored panel is enough."

  TDropdown:
    keywords: [dropdown, actions menu, menu button]
    use_when:
      - "A button should open a short list of actions or choices."
    avoid_when:
      - "The user is choosing a form value with v-model."
    alternatives:
      - component: TSelect
        when: "The dropdown is a form control for selecting a value."
      - component: TContextMenu
        when: "The menu opens from a context action."

  TEmptyState:
    keywords: [empty state, zero state, no data]
    use_when:
      - "A screen or section has no content and needs guidance."
    avoid_when:
      - "You only need a brief inline warning."
    alternatives:
      - component: TAlert
        when: "The layout already has content and only needs a message."

  TFlag:
    keywords: [flag, country flag, country, nationality, region, iso 3166, alpha-2]
    use_when:
      - "You need a country flag rendered from an ISO 3166-1 alpha-2 code."
      - "Flags stacked in a list must share one height so rows stay aligned — the flat assets keep each flag's true proportions and centre inside a fixed 3:2 box."
      - "You want a text fallback when the flag asset cannot load."
    avoid_when:
      - "The flag would be the only carrier of meaning — always pair it with adjacent text such as the language or country name."
      - "You need an interface glyph rather than a country flag."
      - "You are treating the flag as a language identity — a flag names a country, not a language."
    alternatives:
      - component: TIcon
        when: "The graphic is a registered TreeUI icon, not a country flag."
      - component: TLanguageSelect
        when: "The flag belongs to a language or locale picker rather than standing alone."

  TFormField:
    keywords: [form field, label, hint, validation, wrapper]
    use_when:
      - "You need consistent label, hint, and error layout around a control."
    avoid_when:
      - "You need the actual input control."
    alternatives:
      - component: TInput
        when: "You need a text entry control."
      - component: TSelect
        when: "You need a dropdown control."

  TGrid:
    keywords: [grid, columns, dashboard, cards, responsive layout]
    use_when:
      - "Children should flow into responsive columns."
      - "You need stat grids, card grids, or form rows."
    avoid_when:
      - "You only need one-dimensional spacing."
    alternatives:
      - component: TStack
        when: "A single row or column is enough."

  TInput:
    keywords: [input, text field, text entry, single line]
    use_when:
      - "The value is short, plain, and single-line."
    avoid_when:
      - "The content is multiline, numeric, or markdown."
    alternatives:
      - component: TTextarea
        when: "The content is multiline."
      - component: TNumberInput
        when: "The value is numeric."
      - component: TMarkdownEditor
        when: "Rich markdown authoring is needed."

  TLanguageSelect:
    keywords: [language select, language picker, locale, locale picker, i18n, internationalization, translation, country flag]
    use_when:
      - "The user is picking the interface language or locale."
      - "The control is a labelled form field for the language value — `variant=\"field\"` (the default), where the flag leads the trigger and `width` applies."
      - "The control is a page-level language switcher in a navbar or app bar, where nothing nearby says what it changes — `variant=\"switcher\"` leads with a translate icon and trails the current flag, sizes to its content, and ignores `width`."
      - "A navbar switcher should shrink to icon and flag only — `iconOnly` drops the language name, so pass an `aria-label` to name the control."
      - "Each language should render with its country flag, and optionally an endonym as a second line."
      - "The app owns the language list and applies the locale side effects itself."
    avoid_when:
      - "The values are not languages or locales."
      - "The language list is long enough that the user must type to narrow it down."
      - "You expect TreeUI to supply the locale dataset — it ships none, so pass your own `options`."
    alternatives:
      - component: TSelect
        when: "The values are ordinary application data rather than languages or locales."
      - component: TCombobox
        when: "The language list is long enough that typing to narrow it down is required."
      - component: TFlag
        when: "You only need to render one country flag, without a picker around it."

  TLink:
    keywords: [link, anchor, hyperlink, navigation, router link, external link, href, to]
    use_when:
      - "The action navigates somewhere — a URL, a route, or an anchor on the page."
      - "You want consistent link styling with `default`, `muted`, or `danger` emphasis."
      - "You want a component that renders RouterLink when vue-router is installed and a plain <a> when it is not, without branching in the template."
    avoid_when:
      - "The control performs an action rather than navigating (submit, open a dialog, delete) — that is a button, even if it looks like a link."
      - "You need a full call-to-action surface with variants, sizes, and a loading state."
    routing:
      - "Pass `to` for route navigation. It renders RouterLink only if RouterLink is registered in the app; otherwise it falls back to <a href> using `to` when `to` is a string."
      - "Pass `href` for plain URLs. When both are given and RouterLink is unavailable, `href` wins."
      - "Set `external` to add target=\"_blank\" and rel=\"noopener noreferrer\"."
    accessibility:
      - "`disabled` renders a <span> with aria-disabled and tabindex=-1 instead of an anchor, so there is no dead link in the tab order. Prefer hiding or omitting a link over disabling it."
    alternatives:
      - component: TButton
        when: "The control performs an action. Use `variant=\"ghost\"` for a low-emphasis, link-like button."
      - component: TBreadcrumb
        when: "The links form a hierarchy trail."
      - component: TNavMenu
        when: "The links are app-section navigation in a shell or sidebar."

  TMarkdownEditor:
    keywords: [markdown, rich text, editor, preview]
    use_when:
      - "The user needs markdown formatting, toolbar actions, or preview."
    avoid_when:
      - "A plain multiline text area is enough."
    alternatives:
      - component: TTextarea
        when: "You only need multiline plain text."

  TModal:
    keywords: [modal, dialog, blocking, focused task]
    use_when:
      - "The user must complete or review something in a blocking dialog."
    avoid_when:
      - "Only a small hint or contextual panel is needed."
    alternatives:
      - component: TConfirmDialog
        when: "The dialog is specifically about confirm/cancel."
      - component: TDrawer
        when: "A side panel fits better."
      - component: TPopover
        when: "An anchored non-blocking panel is enough."

  TMultiSelect:
    keywords: [multi select, tags, searchable multi choice]
    use_when:
      - "The user needs to select multiple values from a larger list."
      - "Filtering and tag display improve the workflow."
    avoid_when:
      - "The option set is tiny and should always stay visible."
    alternatives:
      - component: TToggleGroup
        when: "The multiple-choice set is very small and visible."
      - component: TCheckbox
        when: "The choices can stay visible as a checklist."
      - component: TTreeView
        when: "The choices are hierarchical."

  TNavMenu:
    keywords: [nav menu, sidebar nav, section nav, nav icons, sidebar rail]
    use_when:
      - "You need app-section navigation inside a shell or sidebar."
      - "Each section should carry an icon — set `icon` on the item to a registered name (`icon: 'layout-dashboard'`). Items with no icon fall back to a letter marker, which is also what a collapsed rail shows."
    avoid_when:
      - "You need tabs for small panel switching."
    icons:
      - "`TNavMenuItem.icon` is `TIconInput`: a registered name or a component. Prefer the name — items usually live in a `ref`/`reactive` array or a route config, and a string is never made reactive, so it needs no `markRaw`."
      - "Register any icon the app needs but TreeUI does not ship, then keep using names. See recipe `nav-menu-icons` and SETUP.yaml → `icons`."
    alternatives:
      - component: TTabs
        when: "The navigation swaps local panels instead of app sections."
      - component: TBreadcrumb
        when: "You are showing hierarchy, not selectable nav."

  TNavbar:
    keywords: [navbar, app bar, top bar, header]
    use_when:
      - "You need a top application bar with start, center, and end areas."
    avoid_when:
      - "You only need a content container."
    alternatives:
      - component: TContainer
        when: "You only need width constraint."

  TNumberInput:
    keywords: [number input, numeric stepper, quantity]
    use_when:
      - "The value is numeric and increment/decrement controls help."
    avoid_when:
      - "The value is free-form text or non-numeric."
    alternatives:
      - component: TInput
        when: "The value is not numeric."

  TPage:
    keywords: [page, page shell, content column, screen layout]
    use_when:
      - "You want a standard screen region under the app shell with consistent max width, page padding, and vertical rhythm between sections."
    avoid_when:
      - "You only need a bare width constraint with no page padding or child spacing."
    alternatives:
      - component: TContainer
        when: "You just need a centered max-width wrapper without page-level block padding or child spacing."
      - component: TStack
        when: "You only need to space a group of children, not lay out a whole page."

  TPageHeader:
    keywords: [page header, title bar, page title, heading and actions]
    use_when:
      - "A screen needs a title (and optional subtitle) with a right-aligned actions area in a consistent hierarchy."
    avoid_when:
      - "You need cross-page hierarchy or navigation trails rather than a single page title."
    alternatives:
      - component: TBreadcrumb
        when: "You are showing where the page sits in a hierarchy, not its title."
      - component: TNavbar
        when: "You need a top application bar, not a per-page title block."

  TPagination:
    keywords: [pagination, pages, list navigation]
    use_when:
      - "The app handles paging outside of `TTable`."
    avoid_when:
      - "The list is infinite-scroll or not paged."
    alternatives:
      - component: TTabs
        when: "The interaction is switching panels, not pages."

  TPopover:
    keywords: [popover, anchored panel, non modal overlay]
    use_when:
      - "You need custom anchored content that can contain controls."
    avoid_when:
      - "The content is just a short hint."
    alternatives:
      - component: TTooltip
        when: "Only a short hint or label is needed."
      - component: TDropdown
        when: "The content is primarily a menu of actions."

  TSelectableList:
    keywords: [selectable list, rich options, option list]
    use_when:
      - "Each option needs description or metadata."
      - "Selection should feel like choosing a row rather than opening a dropdown."
    avoid_when:
      - "The options should live in a compact form control."
    alternatives:
      - component: TSelect
        when: "A compact dropdown is better."
      - component: TTreeView
        when: "The options are hierarchical."

  TSelect:
    keywords: [select, dropdown, single choice]
    use_when:
      - "The user needs a compact single-choice dropdown."
      - "Search is not required."
    avoid_when:
      - "Filtering or multi-selection is required."
    alternatives:
      - component: TCombobox
        when: "Search or filtering is required."
      - component: TMultiSelect
        when: "Multiple values are required."

  TSidebar:
    keywords: [sidebar, app shell, collapsible nav rail]
    use_when:
      - "You need a persistent side shell, often with navigation."
    avoid_when:
      - "The panel should slide over temporary content."
    alternatives:
      - component: TDrawer
        when: "The panel is temporary and overlays content."

  TStack:
    keywords: [stack, spacing, flex column, flex row]
    use_when:
      - "You need one-dimensional spacing and alignment."
    avoid_when:
      - "You need responsive columns."
    alternatives:
      - component: TGrid
        when: "You need multi-column layout."

  TSparkline:
    keywords: [sparkline, mini chart, inline chart, micro trend, trend line, table chart]
    use_when:
      - "You want a compact trend beside a value, in a table cell, or inline in text."
      - "No axes, legend, or tooltip are required."
    avoid_when:
      - "You need axes, multiple labeled series, or a tooltip — use TChart."
    alternatives:
      - component: TChart
        when: "The chart needs axes, a legend, or a tooltip."
      - component: TStat
        when: "A single value with a trend badge is enough."

  TStat:
    keywords: [stat, metric, KPI, dashboard]
    use_when:
      - "A compact metric card with value, trend, and optional icon is needed."
    avoid_when:
      - "You need arbitrary content in a generic surface."
    alternatives:
      - component: TCard
        when: "The content is not a metric."
      - component: TSparkline
        when: "You want to show the metric's trend as an inline mini-chart."

  TSteps:
    keywords: [steps, stepper, progress steps, wizard]
    use_when:
      - "A workflow or staged process should be visible."
    avoid_when:
      - "You need generic tab panels or route navigation."
    alternatives:
      - component: TTabs
        when: "The interaction is panel switching rather than process progression."

  TSwitch:
    keywords: [switch, toggle, on off]
    use_when:
      - "The state is a single immediate boolean toggle."
    avoid_when:
      - "The choice is one of multiple discrete options."
    alternatives:
      - component: TCheckbox
        when: "The control participates in a form checklist or consent flow."
      - component: TToggleGroup
        when: "The user is choosing from multiple options."

  TTable:
    keywords: [table, rows, columns, structured data, listing]
    use_when:
      - "The content is tabular and benefits from rows and columns."
    avoid_when:
      - "The UI is hierarchical or card-based."
    alternatives:
      - component: TSelectableList
        when: "The list is rich but not tabular."
      - component: TTreeView
        when: "The data is hierarchical."

  TTabs:
    keywords: [tabs, tab panels, segmented content]
    use_when:
      - "The user switches between a small set of panels in-place."
    avoid_when:
      - "The panels represent steps in a workflow or app navigation."
    alternatives:
      - component: TSteps
        when: "The panels represent a process."
      - component: TNavMenu
        when: "The selection is app-section navigation."

  TTextarea:
    keywords: [textarea, multiline, long text]
    use_when:
      - "The value is multiline plain text."
    avoid_when:
      - "The authoring experience requires markdown formatting."
    alternatives:
      - component: TInput
        when: "The value is short and single-line."
      - component: TMarkdownEditor
        when: "Markdown authoring is needed."

  TToast:
    keywords: [toast, snackbar, notification]
    use_when:
      - "Feedback should appear temporarily without shifting layout."
    avoid_when:
      - "The message must stay visible in-flow."
    alternatives:
      - component: TAlert
        when: "The message should stay visible in the page."

  TToggleGroup:
    keywords: [toggle group, segmented control, visible options]
    use_when:
      - "The option set is small and should stay visible."
      - "A segmented-button presentation is appropriate."
    avoid_when:
      - "The option set is large or searchable."
    alternatives:
      - component: TSelect
        when: "A compact dropdown fits better."
      - component: TCombobox
        when: "Filtering is required."
      - component: TMultiSelect
        when: "Many multiple-choice options are required."

  TTooltip:
    keywords: [tooltip, hover help, short hint]
    use_when:
      - "You need a short, non-interactive hint anchored to another element."
    avoid_when:
      - "The overlay needs interactive content."
    alternatives:
      - component: TPopover
        when: "The overlay needs interactive content."

  TTreeView:
    keywords: [tree, tree view, hierarchy, nested selection]
    use_when:
      - "The data is hierarchical."
      - "Selection or expansion must work across nested nodes."
    avoid_when:
      - "The data is flat."
    alternatives:
      - component: TSelectableList
        when: "The options are flat rich rows."
      - component: TNavMenu
        when: "The hierarchy is actually app navigation."

  TIcon:
    keywords: [icon, svg, glyph, pictogram, register, register icon, custom icon, icon registry, registerTreeIcons, createTreeIcon]
    use_when:
      - "You need to render an interface icon. `TIcon` is the way to render one — it resolves the name through the registry and applies the shared size, stroke, and a11y defaults."
      - "The icon is one of the built-ins: `<TIcon name=\"cpu\" />`. `listTreeIcons()` returns every registered name at runtime."
      - "The icon is your own: register it once with `registerTreeIcons`, then use it by name exactly like a built-in. A missing icon is registered, not worked around."
    avoid_when:
      - "The graphic is a country flag — a flag names a country, not an interface concept."
      - "A slot already renders the icon for you (`#icon` on TAlert, TBadge, TButton, TConfirmDialog, TEmptyState, TFileUpload, TStat, TTag) — put the `TIcon` inside that slot rather than beside it. None of those components has an `icon` PROP; the slot is the whole interface."
    do_not:
      - "Do not hand-roll an `<svg>` because a name is missing. `createTreeIcon` sets the stroke-width attribute to `(strokeWidth * 24) / size`, which cancels the viewBox scale and paints a constant 2px at every size. A literal `stroke-width=\"2\"` does the opposite: it paints 1.67px at size 20, 2.67px at 32, and 4px at 48, so the icon is slightly light when small and visibly BOLD when large — double the library weight at 48."
      - "Do not reach for an `icon` prop on TButton, TBadge, TStat, TAlert, TTag, TEmptyState, TConfirmDialog, or TFileUpload. They do not have one. `TNavMenuItem.icon` is the only icon-valued prop or item field in the library."
    registering:
      - "Geometry: `registerTreeIcons({ orbit: [['circle', { cx: 12, cy: 12, r: 10 }], ['path', { d: '...' }]] })` — nodes are drawn on a 24x24 grid."
      - "Components: `registerTreeIcons({ webhook: WebhookIcon })` also accepts ready app-owned components under a registry name."
      - "Pick names TreeUI does not already ship — `orbit`, `webhook`, and `radar` are safe; `cpu`, `server`, `workflow`, `boxes`, and `circle-dot` are built-ins. Registering any of the 364 built-in names REPLACES it process-wide with no warning. That is the supported way to swap a built-in for a house version, but it must be the intent, not an accident."
      - "Call it once near the app root, and augment `TIconRegistry` through `declare module '@treeui/icons'` for autocomplete and typo-checking. Registering later is safe — lookups are reactive. Full wiring is in SETUP.yaml → `icons`."
      - "In tests, call `resetTreeIcons()` in an `afterEach`. The registry is process-wide mutable state, so a registered (or replaced) icon otherwise leaks into every later test."
      - "An unknown name resolves to `undefined` and logs a warning — in production builds too, once per name — listing every valid name; `TNavMenu` falls back to its letter marker rather than rendering a hole."
    sizing:
      - "`size` is a PIXEL COUNT, not the `sm | md | lg` token scale — `<TIcon size=\"md\" />` silently renders an unsized svg."
      - "To size from tokens, leave `size` alone and set width/height in CSS from `--tree-size-icon-sm | -md | -lg | -xl | -2xl`."
    alternatives:
      - component: "a component passed straight to `TNavMenuItem.icon`, or rendered into an `#icon` slot"
        when: "You want the escape hatch with no registry entry — a one-off icon, an imported SVG component, or the result of `createTreeIcon(...)`. `TNavMenuItem.icon` is `TIconInput` and takes the component directly; everywhere else, render it inside the component's `#icon` slot. `TIcon` itself will not take a component — its `name` is `TIconName`. Prefer registering when the icon is used in more than one place."
      - component: TFlag
        when: "The graphic is a country flag rendered from an ISO 3166-1 alpha-2 code."

version: 0.1
package: "@treeui/vue"

install:
  package_manager_examples:
    pnpm: "pnpm add @treeui/vue"
    npm: "npm install @treeui/vue"
  required_imports:
    - "@treeui/vue/style.css"
  optional_packages:
    - package: "@treeui/tokens"
      use_when: "The app needs direct access to TreeUI tokens or theme CSS outside the Vue component package."
    - package: "@treeui/icons"
      use_when: "The app augments `TIconRegistry` with `declare module '@treeui/icons'`. The runtime API is already re-exported from `@treeui/vue`, but the module specifier must resolve from the app for the augmentation to augment rather than shadow â€” see `icons` below."

vue_setup:
  plugin_install:
    import: "import TreeUIPlugin from '@treeui/vue'"
    usage: "app.use(TreeUIPlugin)"
  individual_imports:
    import: "import { TButton, TInput, TModal } from '@treeui/vue'"
  guidance:
    - "Use the plugin when global registration is preferred."
    - "Use named imports when tree-shaken local imports fit the consumer app better."
    - "Prefer `T<Name>` imports in all new code."

global_rules:
  - "Always import `@treeui/vue/style.css` once in the consuming application."
  - "All components use the `T<Name>` export prefix; there are no `Tree<Name>` aliases."
  - "Form controls use `modelValue` + `update:modelValue`."
  - "Overlay-style components generally support controlled and uncontrolled open state."
  - "Date-only values use `YYYY-MM-DD`."
  - "Date-time values use `YYYY-MM-DDTHH:mm`."

fonts:
  summary: "TreeUI names its typefaces in tokens but does not ship them. Loading the webfont is the consuming application's job."
  ships:
    - "`@treeui/tokens` emits `--tree-font-family-sans` and `--tree-font-family-mono` as custom properties."
    - "`@treeui/vue/style.css` and `@treeui/react/style.css` set `html { font-family: var(--tree-font-family-sans) }` so prose, layout roots, and the overlays teleported to `<body>` all inherit the design font."
  does_not_ship:
    - "No `@font-face` rules and no font binaries â€” the packages contain no `.woff2`."
  required:
    - "Load Google Sans Flex and Google Sans Code in the host app, or the stack falls back to `'Segoe UI'` / the platform monospace."
  notes:
    - "Google Sans Flex has a `slnt` axis, not `ital`. Requesting `ital` from the Google Fonts API returns HTTP 200 with upright-only faces, so italics silently become synthetic obliques. Request `slnt,wght@-10..0,400..800` for a real slant."
    - "Both families are SIL OFL 1.1, so self-hosting is permitted; ship the licence alongside the binaries."
    - "The base `html` rule is specificity (0,0,1) â€” any app rule overrides it. Setting a font on an app root such as `#app` is not enough on its own, because teleported overlays are children of `<body>`, not of that root."
  example: |
    <!-- index.html -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:slnt,wght@-10..0,400..800&family=Google+Sans+Code:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />

icons:
  summary: >-
    TreeUI renders icons from a name registry rather than from per-icon imports.
    Built-in icons are used by name; an app adds its own once with
    `registerTreeIcons` and then uses those by name too, everywhere an icon is
    accepted.
  ships:
    - "364 built-in names, reached by name â€” `<TIcon name=\"cpu\" />`, `icon: 'cpu'` on a nav item. The catalog covers interface, product, file, status, and action vocabulary using TreeUI's own descriptive kebab-case names."
    - "`listTreeIcons()` returns every registered name (built-ins plus anything the app registered), sorted â€” use it instead of hardcoding the list."
    - "The whole registry API is re-exported from `@treeui/vue`: `registerTreeIcons`, `resetTreeIcons`, `createTreeIcon`, `resolveTreeIcon`, `getTreeIcon`, `hasTreeIcon`, `listTreeIcons`, `treeIcons`, `builtinTreeIconNodes`, `treeIconDefaults`, and the `TIconName` / `TIconInput` / `TIconDefinition` / `TIconNode` / `TIconNodes` / `TIconRegistry` types. Registering icons needs no extra runtime dependency."
    - "`resetTreeIcons()` restores the registry to the icons TreeUI ships, dropping everything registered since. It exists for tests: the registry is process-wide mutable state, so call it in an `afterEach` or a registration in one case leaks into every case after it."
    - "`builtinTreeIconNodes` is the built-in GEOMETRY keyed by name (`Record<string, TIconNodes>`), not components â€” `treeIcons` is the name-to-component map. It was called `builtinTreeIcons` before; the old name read like a component map."
  does_not_ship:
    - "Named imports for individual icons. There is no `import { Cpu } from '@treeui/icons'` â€” an icon is reached by registry name, or passed as a component."
    - "Application-specific artwork. An app needing a name outside the curated catalog registers its own geometry or component under that name."
  required:
    - "Call `registerTreeIcons` once, near the application root, BEFORE anything renders â€” in `main.ts` beside `app.use(TreeUIPlugin)`, not inside a component's `setup`."
    - "Register a name before any component references it. A name that is not registered at render time resolves to nothing and warns."
  notes:
    - "Registration is per name and idempotent. Registering one of the 364 built-in names REPLACES that built-in for the whole process, silently â€” that is how a built-in is swapped for a house version, so it must be deliberate. To ADD an icon, pick a name TreeUI does not ship (`orbit`, `webhook`, and `radar` are safe); `listTreeIcons()` or `hasTreeIcon(name)` tells you which names are taken."
    - "Components are built lazily on first lookup and cached, so an icon nobody renders stays as data instead of becoming a component â€” registering a large set is cheap. This is not a bundle-size claim: the geometry for all 364 built-ins is held in a module-scope `Map`, so importing the package retains it and `sideEffects: false` does not tree-shake it away."
    - "Every glyph inherits the surrounding text color through the root `currentColor` stroke and needs no color prop. Company logos are not built-ins; import the official SVG as an app-owned component and register it when needed."
    - "The catalog includes 12 compatibility aliases with identical geometry: grid â†’ layout-grid, share â†’ share-nodes, chevron-updown â†’ chevrons-up-down, refresh â†’ refresh-cw, comment/chat â†’ message-circle, check-square â†’ square-check, help â†’ circle-help, automations â†’ zap, connections â†’ external-link, persona â†’ user-round, and close â†’ x."
    - "Prefer a name over a component in application data (menu definitions, route metadata, API payloads). A string is never made reactive, while a component object stored in a `ref`/`reactive` triggers Vue's reactivity warning and needs `markRaw`."
    - "An unknown name renders nothing and logs a `console.warn` listing every valid name â€” once per name, and in production builds too, not dev-only. `TNavMenu` degrades to its letter marker rather than leaving a hole."
    - "Never hand-roll an `<svg>` for a missing icon. `createTreeIcon` applies `absoluteStrokeWidth`: it sets the stroke-width attribute to `(strokeWidth * 24) / size`, which cancels the 24-unit viewBox scale and paints a constant 2px at any size. A fixed `stroke-width=\"2\"` scales with the icon instead â€” 1.67px at size 20, 2.67px at 32, 4px at 48 â€” so it reads slightly thin when small and clearly bolder than its neighbours when large. Hand-rolling also loses the `size` / `strokeWidth` / `absoluteStrokeWidth` props and the `aria-hidden` default."
    - "In tests, call `resetTreeIcons()` in an `afterEach`. The registry is anchored on a `Symbol.for` global (so duplicate copies of the package share one registry), which also means every registration persists for the process."
    - "`TIcon`'s `size` is a PIXEL COUNT, not the `sm | md | lg` token scale â€” `<TIcon size=\"md\" />` silently renders an unsized svg. To size from tokens, leave `size` alone and set width/height in CSS from `--tree-size-icon-sm | -md | -lg | -xl | -2xl`."
    - "The `declare module '@treeui/icons'` augmentation only augments if TypeScript can resolve `@treeui/icons` from the app; otherwise it declares a new ambient module and shadows the real types. Under pnpm's isolated `node_modules` a transitive dependency is not resolvable, so add `@treeui/icons` as a direct dependency when you augment."
    - "Augmenting the registry is optional: `registerTreeIcons` works without it, and unaugmented names still render. The augmentation buys autocomplete and typo-checking on every `name` / `icon`."
  example: |
    // main.ts â€” once, before mount
    import { createApp } from 'vue';
    import TreeUIPlugin, { registerTreeIcons } from '@treeui/vue';
    import WebhookIcon from './icons/WebhookIcon.vue';
    import '@treeui/vue/style.css';
    import App from './App.vue';

    registerTreeIcons({
      // geometry, on a 24x24 grid â€” the common case
      orbit: [
        ['rect', { x: 3, y: 3, width: 7, height: 7, rx: 1.5 }],
        ['rect', { x: 14, y: 14, width: 7, height: 7, rx: 1.5 }],
        ['path', { d: 'M10 6.5h4a2 2 0 0 1 2 2V14' }],
      ],
      // or an app-owned component
      webhook: WebhookIcon,
    });

    createApp(App).use(TreeUIPlugin).mount('#app');
  type_safety_example: |
    // env.d.ts (or any .d.ts in the app's tsconfig `include`) â€” once.
    // Widens TIconName, so `<TIcon name="orbit" />` type-checks and
    // autocompletes, and a typo is a compile error.
    // List exactly the names passed to registerTreeIcons; built-ins are
    // already keys and do not need repeating.
    // The `export {}` is required: it makes this file a module, which is what
    // makes `declare module` an augmentation. Without it the block declares a
    // new ambient module that SHADOWS the real one and every export reads as missing.
    export {};

    declare module '@treeui/icons' {
      interface TIconRegistry {
        orbit: true;
        webhook: true;
      }
    }
  escape_hatch: |
    <!-- `TNavMenuItem.icon` is `TIconInput`, so a component works there with no
         registry entry. It is the ONLY icon-valued prop or item field in the
         library â€” TButton, TBadge, TStat, TAlert, TTag, TEmptyState,
         TConfirmDialog and TFileUpload have no `icon` prop at all and take
         rendered content through their `#icon` slot instead.
         Use this for one-offs; register anything used more than once. -->
    <script setup lang="ts">
    import { createTreeIcon, type TNavMenuItem } from '@treeui/vue';
    import BrandMark from './BrandMark.vue';

    const spark = createTreeIcon('TSparkIcon', [['path', { d: 'M12 2v20' }]]);

    // markRaw is only needed if this array becomes reactive; a registered NAME
    // sidesteps the question entirely, which is why names are preferred.
    const items: TNavMenuItem[] = [
      { label: 'Brand', value: 'brand', icon: BrandMark },
      { label: 'Spark', value: 'spark', icon: spark },
    ];
    </script>

    <template>
      <!-- everywhere else: the icon goes in the slot, not in a prop -->
      <TButton>
        <template #icon><TIcon name="plus" /></template>
        Add
      </TButton>
    </template>

theming:
  useTheme:
    purpose: "Theme-mode + accent controller for the app root. Owns the parts of theming that belong to the design system rather than the app."
    responsibilities:
      - "Resolves `system` against the OS via `prefers-color-scheme`."
      - "Writes the resolved theme to `data-tree-theme` on the target element (defaults to `<html>`)."
      - "Persists `{ mode, accent }` to localStorage (`storageKey`, default `treeui-theme`; pass `null` to disable)."
      - "Applies a custom accent as `--tree-color-brand-*` / `--tree-color-focus-ring` and RE-DERIVES it whenever the theme flips."
    returns: "{ mode, resolved, accent, setMode, setAccent }"
    required:
      - "Call once near the application root â€” it mutates a shared element."
    notes:
      - "Do not hand-roll accent variables: a raw hex is not legible in both themes. `deriveBrandRamp`/`accentCssVariables` from `@treeui/tokens` walk the colour until it clears WCAG AA on its own soft tint and flip the on-brand text colour with it."
      - "Pair with `TColorSwatch` for the accent picker UI."
    example: |
      const { mode, resolved, accent } = useTheme({ storageKey: 'my-app-theme' });
      mode.value = 'dark';        // 'system' | 'light' | 'dark'
      accent.value = '#0969da';   // re-derived per theme automatically

component_setup:
  TToast:
    required:
      - "Mount one `TToastProvider` near the application root before calling `useToast()` from feature components."
    notes:
      - "Use `useToast()` for programmatic notifications."
      - "Choose provider `position` once per app shell unless a feature has a strong reason to differ."

  TFormField:
    required:
      - "Wrap a control such as `TInput`, `TSelect`, `TCombobox`, `TCheckbox`, or `TDatePicker`."
      - "Pass `htmlFor` matching the child control `id` when the child exposes one."
    notes:
      - "Set the child control invalid state separately when `error` is present."

  TSelect:
    notes:
      - "Pass `options` as `{ label, value, disabled? }[]` where `value` can be `string` or `number`."
      - "Use `placeholder` when no selection has been made."

  TCombobox:
    notes:
      - "Pass `options` as labeled items and keep labels human-readable because search matches visible fields."

  TMultiSelect:
    notes:
      - "Pass `modelValue` as `string[]`."
      - "Option search checks `label`, `description`, and `keywords`."
      - "Use `maxVisibleTags` to control trigger density in compact layouts."

  TFlag:
    required:
      - "Pass `code` as an ISO 3166-1 alpha-2 country code. Matching is case-insensitive â€” the value is trimmed and lowercased internally."
      - "Allow `https://flagcdn.com` in the app `Content-Security-Policy` `img-src` directive, or point `baseUrl` at a self-hosted mirror â€” flag images are fetched from a third-party CDN at runtime."
    notes:
      - "A mirror must serve `{baseUrl}/{segment}/{code}.png` for both steps of every size: 1x `h20` (sm), `h20` (md), `h24` (lg); 2x `h40` (sm), `h40` (md), `h60` (lg). The 2x asset is emitted through `srcset`."
      - "Those fixed-height segments are part of the contract, and they are the CDN's flat artwork â€” a mirror must serve flat flags, not the waving ones."
      - "Do not substitute the CDN's ratio-normalised width-by-height endpoints. They equalise aspect ratio only by switching to the waving artwork, which reads as decoration next to flat UI icons."
      - "The fixed-height assets keep each flag's true proportions â€” Nepal is a pennant, Switzerland is square, Qatar is elongated. A shared height, not a shared ratio, is what aligns a column of flags."
      - "CSS puts the image in a fixed 3:2 box (3:2 being the most common national flag ratio) with `object-fit: contain`, so outliers centre inside the box instead of being cropped or distorted."
      - "Each retina segment is at least twice its box height â€” boxes are `--tree-size-icon-sm/md/lg` = 16px/20px/24px â€” so 2x screens never upscale."
      - "`baseUrl` may be written with or without a trailing slash; trailing slashes are stripped before the path is built. An unknown `size` falls back to the `md` assets."
      - "When the image cannot load â€” offline, blocked by CSP, unknown code â€” the component renders the uppercased `code` as text. Override that text with `fallbackText`."
      - "The flag is `aria-hidden` by default. Pass `label` only when the flag carries meaning on its own; beside a visible country or language name it should stay decorative."

  TLanguageSelect:
    required:
      - "Pass `options` as `{ label, value, code?, description?, disabled? }[]`. TreeUI ships no language, locale, or country dataset â€” the app owns its language list."
      - "Apply locale side effects (i18n locale, `lang` attribute, persistence) in the app layer; the component only reports the selected `value`."
      - "Pass an `aria-label` whenever `iconOnly` is set â€” the visible language name is gone, so it is the control's only accessible name. It also labels the listbox."
    notes:
      - "`variant` is `field` (default) or `switcher`, typed as `TLanguageSelectVariant` and exported from `@treeui/vue`."
      - "Use `variant=\"field\"` inside a form, next to other inputs, or wrapped in `TFormField`: the flag leads the trigger, the trigger fills its container, and `width` applies. A visible field label already says what the control changes."
      - "Use `variant=\"switcher\"` for a page-level control in a navbar or app bar, where nothing nearby labels it. A translate icon (`TIcon name=\"languages\"`) leads and the current flag trails before the chevron, so the control reads as \"page language, now set to this\" without an external label."
      - "A switcher sizes to its content, so `width` does not apply, and its listbox aligns to the trigger's right edge."
      - "`iconOnly` is switcher-only and drops the visible language name, leaving the translate icon and the current flag."
      - "`value` is an opaque application key, typically a BCP-47 tag such as `pt-BR`. TreeUI never parses or validates it."
      - "`code` is the ISO 3166-1 alpha-2 code used for the option flag. Omit it to render the option without a flag â€” a language is not a country, so many entries have no honest flag."
      - "Use `description` for a secondary line such as the endonym."
      - "Set `flagBaseUrl` once on the select rather than per option; it is forwarded to every nested `TFlag`."
      - "Bind `modelValue` to a `string`, and use `v-model:open` when the app controls open state."
      - "The CDN and Content-Security-Policy requirements under `TFlag` apply whenever any option carries a `code`."

  TToggleGroup:
    notes:
      - "Use `selectionMode=\"single\"` for segmented single choice."
      - "Use `selectionMode=\"multiple\"` for small visible multi-choice sets."

  TDatePicker:
    notes:
      - "Bind `modelValue` to a `YYYY-MM-DD` string."
      - "Use `min` and `max` with the same format."

  TDateTimePicker:
    notes:
      - "Bind `modelValue` to a `YYYY-MM-DDTHH:mm` string."
      - "Use `step` in seconds. Values divisible by 60 produce minute increments."
      - "Use `min` and `max` in the same date-time format."

  TFileUpload:
    notes:
      - "Bind `modelValue` to `File[]`."
      - "Use `accept`, `multiple`, and size limits in the app layer to constrain uploads."

  TAppShell:
    notes:
      - "Mount at the app root; it fills the viewport (100dvh, full width) and scrolls its content region independently."
      - "Put navigation in the `sidebar` slot (e.g. `TNavMenu`) â€” it inherits collapsed state from the shell provider like `TSidebar`."
      - "Leave `mobile` unset to auto-switch to an off-canvas drawer at `breakpoint`, or bind `mobile` to control it explicitly."
      - "Use `v-model:collapsed` for the desktop rail and `v-model:sidebarOpen` for the mobile drawer when the app persists layout state."

  TSidebar:
    notes:
      - "Pair with `TNavMenu` for app-section navigation."
      - "Use controlled `collapsed` state when the app shell persists layout preferences."
      - "Prefer `TAppShell` when you also want full-viewport sizing, a top header, and a responsive mobile drawer."

  TNavMenu:
    notes:
      - "When nested inside `TSidebar` or `TAppShell`, `collapsed` can be inherited from the sidebar provider."
      - "Pass `items` as `{ label, value, icon?, to?, badge?, description?, shortLabel?, disabled?, exact? }[]`."
      - "`icon` is `TIconInput` â€” a registered icon name (`icon: 'layout-dashboard'`) or a component. Use the name: it needs no import, and no `markRaw` when the item list is reactive."
      - "An item with no icon, or with a name that is not registered, shows a letter marker instead. That marker is also all a collapsed rail can show, so give every item an icon when the sidebar collapses."
      - "Register any icon the app needs beyond the built-ins first â€” see `icons` above."

  TIcon:
    required:
      - "Use a registered name: one of the built-ins, or one the app added with `registerTreeIcons`. See `icons` above."
    notes:
      - "`size` is a pixel count, not `sm | md | lg`. Passing `size=\"md\"` renders an unsized svg."
      - "The icon is `aria-hidden` by default. Pass `label` only when the icon carries meaning on its own; beside visible text it should stay decorative."

  TTreeView:
    notes:
      - "Use `nodes` shaped as `{ id, label, description?, meta?, disabled?, children? }[]`."
      - "Control `expanded` separately when the parent app needs to persist open branches."

  TSteps:
    notes:
      - "Pass explicit `status` per item only when the app should override the computed complete/current/upcoming logic."

  TPricing:
    notes:
      - "Pass `plans` matching the same core fields used by `TPricingCard`."

  TModal:
    notes:
      - "Use `v-model:open` for the idiomatic Vue controlled pattern."

  TBreadcrumb:
    notes:
      - "Use `href` for native links."
      - "Use `to` when the app has vue-router and breadcrumb items should render RouterLink."

  TChart:
    notes:
      - "Pass `series` as `{ name, data, color? }[]` and `labels` as a parallel `string[]` (one label per data index)."
      - "Set `type` to `line`, `area`, or `bar`; use `stacked` only with `bar`."
      - "Series colors come from `--tree-color-chart-1..8` in order; pass `color` per series to override â€” do not remap colors when the series set changes."
      - "Pass `valueFormat: (n) => string` to format axis and tooltip values (currency, compact, etc.)."
      - "No charting library or provider is required â€” the SVG and geometry are built in."

  TSparkline:
    notes:
      - "Pass `data` as `number[]`; there are no axes, legend, or tooltip by design."
      - "Size it with `width`/`height`; use it inside `TStat`, table cells, or text."
      - "Always keep a visible number nearby â€” a sparkline supplements a value, it does not replace it."

  TDonutChart:
    notes:
      - "Pass `segments` as `{ label, value, color? }[]`; non-positive values are dropped."
      - "Set `thickness: 0` for a full pie; keep the default for a donut with a center readout."
      - "Use the `center` slot (donut only) for a custom center; otherwise it shows the total or the hovered slice."

app_patterns:
  providers:
    - component: TToastProvider
      placement: "application root or shell root"
      reason: "Programmatic toast rendering"
  common_compositions:
    - "TFormField + input-like control"
    - "TFormField + TLanguageSelect"
    - "TGrid + TStat"
    - "TStat + TSparkline"
    - "TCard + TChart"
    - "TAppShell + TNavMenu"
    - "TSidebar + TNavMenu"
    - "TTable + TPagination"
    - "TPricing + TPricingCard"

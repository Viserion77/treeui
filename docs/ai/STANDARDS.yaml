# ─────────────────────────────────────────────────────────────
# TreeUI — Design System Standards
# ─────────────────────────────────────────────────────────────
# Describes the foundational design rules for TreeUI.
# Describes the foundational rules every token, component,
# and style in TreeUI MUST follow. Use VALIDATION.yaml to
# audit individual components against these rules.
# ─────────────────────────────────────────────────────────────

version: "0.1"
source: "TreeUI Design Standards"

# ═══════════════════════════════════════════════════════════════
# 01 — COLOR SYSTEM
# ═══════════════════════════════════════════════════════════════
color:
  rule: >
    Define a semantic color palette. Never use raw hex values in
    component code — always reference design tokens.
  semantic-roles:
    - bg.primary        # Main background
    - bg.surface        # Card / elevated surface
    - bg.subtle         # Subtle backgrounds (TreeUI extension)
    - border.default    # Default border
    - border.strong     # Emphasized border (TreeUI extension)
    - text.primary      # Main text
    - text.muted        # Secondary text
    - text.inverse      # Text on dark fills (TreeUI extension)
    - brand.primary     # Primary brand color
    - brand.hover       # Brand hover state (TreeUI extension)
    - brand.soft        # Brand soft background (TreeUI extension)
    - brand.contrast    # Brand contrast text (TreeUI extension)
    - status.success    # Success state
    - status.warning    # Warning state (TreeUI extension)
    - status.error      # Error / destructive state
    - status.info       # Info state (TreeUI extension)
    - overlay           # Scrim / backdrop
    - focus-ring        # Focus ring color

  themes:
    required: [light, dark]
    selector: '[data-tree-theme="<name>"]'
    note: Light and dark are first-class citizens.

  conformance:
    treeui-status: PASS
    notes: >
      TreeUI defines all required semantic roles plus additional
      roles (bg.subtle, border.strong, text.inverse, brand.hover,
      brand.soft, brand.contrast, status.warning, status.info).
      Both light and dark themes are fully implemented with
      data-tree-theme selectors. No raw hex values in components.

# ═══════════════════════════════════════════════════════════════
# 02 — TYPOGRAPHY SCALE
# ═══════════════════════════════════════════════════════════════
typography:
  rule: >
    Use a modular scale for consistent hierarchy. Each step
    should feel intentional.

  reference-scale:
    text-5xl: { size: "48px", weight: 800 }
    text-4xl: { size: "36px", weight: 700 }
    text-3xl: { size: "28px", weight: 700 }
    text-2xl: { size: "22px", weight: 600 }
    text-lg:  { size: "18px", weight: 400 }
    text-base: { size: "15px", weight: 400 }
    text-sm:  { size: "13px", weight: 400 }
    text-xs:  { size: "11px", weight: 500 }

  treeui-scale:
    5xl:  "3rem (48px)"
    4xl:  "2.25rem (36px)"
    3xl:  "1.75rem (28px)"
    2xl:  "1.375rem (22px)"
    lg:   "1.125rem (18px)"
    base: "0.9375rem (15px)"
    sm:   "0.8125rem (13px)"
    xs:   "0.6875rem (11px)"

  font-weights:
    required: [400, 500, 600, 700, 800]
    treeui: [regular=400, medium=500, semibold=600, bold=700, extrabold=800]

  line-heights:
    headings: "1.1–1.3"
    body: "1.5–1.7"
    ui-labels: "1.0–1.2"
    treeui-mapping:
      compact: "1.1"    # headings (large)
      ui: "1.15"        # ui labels
      tight: "1.25"     # tight headings
      heading: "1.3"    # section headings
      base: "1.5"       # body start
      body: "1.6"       # body default
      relaxed: "1.65"   # body relaxed

  conformance:
    treeui-status: PASS
    notes: >
      All 8 type scale steps match the reference scale exactly.
      All 5 font weights are defined. Line heights cover all
      three reference ranges (headings, body, ui-labels).

# ═══════════════════════════════════════════════════════════════
# 03 — SPACING & GRID
# ═══════════════════════════════════════════════════════════════
spacing:
  rule: >
    Use a 4px base unit. Every margin, padding, and gap
    must be a multiple of 4px.

  reference-scale:
    space-1:  "4px"
    space-2:  "8px"
    space-3:  "12px"
    space-4:  "16px"
    space-6:  "24px"
    space-8:  "32px"
    space-12: "48px"
    space-16: "64px"

  treeui-scale:
    space-0:  "0"
    space-1:  "0.25rem (4px)"
    space-2:  "0.5rem (8px)"
    space-3:  "0.75rem (12px)"
    space-4:  "1rem (16px)"
    space-5:  "1.25rem (20px)"
    space-6:  "1.5rem (24px)"
    space-8:  "2rem (32px)"
    space-12: "3rem (48px)"
    space-16: "4rem (64px)"

  grid:
    base-unit: "8px"
    columns: 12
    gutter: "16–24px"
    margin: "24–48px"
    treeui-layout:
      grid-columns: 12
      grid-base: "8px"
      gutter-sm: "1rem (16px)"
      gutter-md: "1.5rem (24px)"
      margin-sm: "1.5rem (24px)"
      margin-md: "2rem (32px)"
      margin-lg: "3rem (48px)"

  conformance:
    treeui-status: PASS
    notes: >
      All reference spacing steps present. TreeUI adds
      space-0 and space-5 (20px). Grid system matches:
      12 columns, 8px base. Gutter and margin ranges match.

# ═══════════════════════════════════════════════════════════════
# 04 — COMPONENTS
# ═══════════════════════════════════════════════════════════════
components:
  rule: >
    Components are the building blocks. Define every state:
    default, hover, active, disabled, focus.

  buttons:
    reference-variants: [Primary, Secondary, Ghost, Destructive, Disabled]
    reference-sizes: [Small, Medium, Large]
    treeui-variants: [solid, outline, ghost, soft, danger]
    treeui-sizes: [sm, md, lg]
    mapping:
      Primary: solid
      Secondary: outline
      Ghost: ghost
      Destructive: danger
      Disabled: "(state, not variant — applied via disabled prop)"
    states-required: [default, hover, active, disabled, focus, loading]

  inputs:
    reference-states: [default, focused, filled, disabled]
    treeui-states: [default, focused, filled, disabled, invalid, loading]
    note: TreeUI adds invalid and loading states beyond the reference.

  cards:
    reference-structure: [image, title, description, action-button]
    treeui-structure: [header-slot, body-slot, footer-slot]
    treeui-variants: [outline, soft, solid]
    treeui-sizes: [sm, md, lg]

  badges:
    reference-variants: [New, Active, Pending, Error, Default]
    treeui-variants: [solid, outline, ghost, soft, danger]
    note: >
      Reference uses semantic labels; TreeUI uses visual style
      variants. Users apply color semantics via variant choice.

  conformance:
    treeui-status: PASS
    notes: >
      Buttons cover all reference variants/sizes plus loading state.
      Inputs exceed the reference with invalid + loading.
      Cards have flexible slot-based structure.
      Badges use systematic variants instead of hard-coded semantics.

# ═══════════════════════════════════════════════════════════════
# 05 — ICONS & ICONOGRAPHY
# ═══════════════════════════════════════════════════════════════
icons:
  rule: >
    Icons must be consistent in style, weight, and size.
    Use one library consistently.

  reference-sizes:
    inline: "16px"
    default: "20px"
    navigation: "24px"
    feature: "32px"
    hero: "48px"

  treeui-sizes:
    sm:  "1rem (16px)"
    md:  "1.25rem (20px)"
    lg:  "1.5rem (24px)"
    xl:  "2rem (32px)"
    2xl: "3rem (48px)"

  style-rules:
    - "2px stroke weight (consistent)"
    - "Rounded caps & joins"
    - "Optical alignment on grid"
    - "24×24 default bounding box"
    - "Use currentColor for fills"

  touch-targets:
    rule: >
      Even if icon is 20px, interactive area must be at least
      44×44px for accessible tap targets.
    treeui-implementation: >
      Components use ::after pseudo-elements to ensure 44×44px
      minimum touch targets.

  conformance:
    treeui-status: PASS
    notes: >
      All 5 icon sizes match the reference scale exactly.
      Touch target rule implemented in CSS via ::after.
      Icons use currentColor for theming.

# ═══════════════════════════════════════════════════════════════
# 06 — MOTION & ANIMATION
# ═══════════════════════════════════════════════════════════════
motion:
  rule: >
    Motion must be purposeful — every animation should inform,
    not distract. Never block the user. 300ms max for interactions.

  easing-curves:
    reference:
      ease-out: "Enter / appear"
      ease-in-out: "Move / resize"
      ease-in: "Exit / leave"
    treeui:
      easeOut: "cubic-bezier(0, 0, 0.2, 1)"
      easeInOut: "cubic-bezier(0.4, 0, 0.2, 1)"
      easeIn: "cubic-bezier(0.4, 0, 1, 1)"
      standard: "cubic-bezier(0.2, 0, 0, 1)"

  duration-scale:
    reference:
      100ms: "Micro — hover, toggle, fade"
      200ms: "Small — button press, tooltip"
      300ms: "Medium — modal, dropdown"
      400ms: "Large — page transition, slide"
      500ms: "XL — complex orchestration"
    treeui:
      fast: "100ms"
      moderate: "200ms"
      normal: "300ms"
      slow: "400ms"
      slower: "500ms"

  principles:
    - "Purposeful: guide attention, show relationships"
    - "Fast: never block the user, 300ms max for interactions"
    - "Natural: follow physics — ease-out for enters, ease-in for exits"

  conformance:
    treeui-status: PASS
    notes: >
      All 3 easing curve types present. All 5 duration steps
      match the reference. TreeUI adds a 'standard' easing for
      general UI motion. animation CSS uses correct easing pairs.

# ═══════════════════════════════════════════════════════════════
# 07 — BEST PRACTICES
# ═══════════════════════════════════════════════════════════════
best-practices:
  do:
    - "Use consistent spacing (4px/8px grid)"
    - "Limit color palette to semantic tokens"
    - "Use a type scale for hierarchy"
    - "Document ALL component states"
    - "Use semantic color tokens (var(--tree-*))"
  dont:
    - "Eyeball spacing randomly"
    - "Use every color you like"
    - "Use arbitrary font sizes"
    - "Only design the happy path"
    - "Hardcode hex values"


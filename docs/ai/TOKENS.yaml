    Every CSS custom property @treeui/tokens actually emits. Generated from
    packages/tokens/src/tokens.ts via packages/tokens/src/css.ts. If a name is
    not in this list, it does not exist. Copy names from here verbatim rather
    than composing them from roles.
  total: 105
  foundation:
    count: 79
    scope: "Emitted on :root — theme-independent, identical in light and dark."
    variables:
      # font
      --tree-font-family-sans: "'Google Sans Flex', 'Segoe UI', sans-serif"
      --tree-font-family-mono: "'Google Sans Code', 'SFMono-Regular', monospace"
      --tree-font-size-xs: "0.6875rem"
      --tree-font-size-sm: "0.8125rem"
      --tree-font-size-md: "0.9375rem"
      --tree-font-size-base: "0.9375rem"
      --tree-font-size-lg: "1.125rem"
      --tree-font-size-xl: "1.375rem"
      --tree-font-size-2xl: "1.375rem"
      --tree-font-size-3xl: "1.75rem"
      --tree-font-size-4xl: "2.25rem"
      --tree-font-size-5xl: "3rem"
      --tree-font-weight-regular: "400"
      --tree-font-weight-medium: "500"
      --tree-font-weight-semibold: "600"
      --tree-font-weight-bold: "700"
      --tree-font-weight-extrabold: "800"
      --tree-font-lineHeight-compact: "1.1"
      --tree-font-lineHeight-ui: "1.15"
      --tree-font-lineHeight-tight: "1.25"
      --tree-font-lineHeight-heading: "1.3"
      --tree-font-lineHeight-base: "1.5"
      --tree-font-lineHeight-body: "1.6"
      --tree-font-lineHeight-relaxed: "1.65"
      # space
      --tree-space-0: "0"
      --tree-space-1: "0.25rem"
      --tree-space-2: "0.5rem"
      --tree-space-3: "0.75rem"
      --tree-space-4: "1rem"
      --tree-space-5: "1.25rem"
      --tree-space-6: "1.5rem"
      --tree-space-8: "2rem"
      --tree-space-12: "3rem"
      --tree-space-16: "4rem"
      # radius
      --tree-radius-sm: "0.375rem"
      --tree-radius-md: "0.625rem"
      --tree-radius-lg: "0.875rem"
      --tree-radius-pill: "999px"
      # shadow
      --tree-shadow-xs: "0 1px 2px rgba(15, 23, 42, 0.06)"

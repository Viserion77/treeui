version: 0.1
package: "@treeui/tokens"
css_variable_prefix: "--tree-"
theme_selector: '[data-tree-theme="<name>"]'
themes: [light, dark]

naming_grammar:
  read_this_first: >
    Do NOT compose a variable name by gluing the prefix onto a role you found in
    this file. Theme colors and foundation tokens use DIFFERENT grammars, and
    guessing produces dead CSS that fails silently. The authoritative list of
    every real name is `emitted_variables` below — copy from there.
  how_names_are_generated:
    source: packages/tokens/src/css.ts
    rule: "`--tree-` + the nested object path joined with `-`, with no case conversion."
  forms:
    theme_color:
      grammar: "--tree-color-<group>-<role>"
      mandatory_color_segment: true
      why: >
        Every theme lives under a top-level `color` key in `treeThemes`, so the
        flattener always emits `color` as the first path segment. There is no
        theme variable without it.
      correct: "--tree-color-status-error"
      wrong: "--tree-status-error"
      wrong_note: "Composing prefix + role from `semantic_color_roles` yields this. It does not exist and resolves to nothing."
      applies_to: [bg, border, text, brand, status, chart]
    theme_color_ungrouped:
      grammar: "--tree-color-<name>"
      why: "`overlay` and `focus-ring` sit directly under `color` with no group, so they take only one segment."
      members: ["--tree-color-overlay", "--tree-color-focus-ring"]
      wrong: ["--tree-color-misc-overlay", "--tree-overlay"]
      wrong_note: "`misc` is a documentation grouping in this file only. It is never part of a variable name."
    foundation:
      grammar: "--tree-<group>-<name>"
      no_color_segment: true
      why: "Foundation tokens are not colors and have no `color` root key."
      correct: ["--tree-space-4", "--tree-radius-md", "--tree-shadow-sm", "--tree-z-modal", "--tree-size-control-md"]
      wrong: ["--tree-color-space-4"]
      applies_to: [font, space, radius, shadow, gradient, border, motion, size, layout, z, breakpoint]
    foundation_nested:
      grammar: "--tree-<group>-<subgroup>-<name>"
      why: "Groups with a second level of nesting emit all three segments."
      correct: ["--tree-font-size-lg", "--tree-border-width-subtle", "--tree-motion-duration-fast", "--tree-size-icon-md", "--tree-layout-gutter-md"]
  casing_traps:
    rule: "Path segments are emitted verbatim — camelCase keys stay camelCase in kebab-case names."
    members:
      - "--tree-font-lineHeight-base (NOT --tree-font-line-height-base)"
      - "--tree-motion-easing-easeOut (NOT --tree-motion-easing-ease-out)"
      - "--tree-motion-easing-easeInOut"
      - "--tree-motion-easing-easeIn"
    also: "`--tree-color-focus-ring` is genuinely hyphenated, because its source key is the literal string 'focus-ring'."

semantic_color_roles:
  note: >
    Roles only. These are NOT variable names — prefix each with `--tree-color-`.
    See `naming_grammar` and `emitted_variables`.
  bg:
    roles: [primary, surface, subtle]
    semantics:
      primary:
        variable: "--tree-color-bg-primary"
        means: "The page canvas — the backdrop everything else sits on."
        use_for: "App shell content area, page background."
      surface:
        variable: "--tree-color-bg-surface"
        means: "A raised component surface sitting ON the canvas."
        use_for: "Cards, modals, popovers, menus, table bodies, inputs. This is the default surface for components."
      subtle:
        variable: "--tree-color-bg-subtle"
        means: "A recessed or tinted surface — a step back from `surface`, not a second brand color."
        use_for: "Inset/soft card variants, hover states on ghost controls, zebra table rows, code blocks, disabled fills."
    there_is_no:
      names: [bg-secondary, bg-tertiary, bg-muted, bg-default, bg-elevated]
      guidance: >
        These do not exist. The scale is a three-step depth axis
        (canvas → surface → recessed), not a semantic emphasis ramp. If you reached
        for "secondary", you almost certainly want `subtle`. For a raised surface,
        use `surface` and add `--tree-shadow-sm`.
  border:
    roles: [default, strong]
    semantics:
      default: "Standard component border."
      strong: "Higher-contrast border for emphasis or hover."
  text:
    roles: [primary, muted, inverse]
    semantics:
      primary: "Default body and heading text."
      muted: "Secondary text — hints, descriptions, metadata, placeholders."
      inverse: "Text on a filled dark/brand surface."
  brand:
    roles: [primary, hover, soft, contrast]
    semantics:
      primary: "The accent color itself."
      hover: "Hover/active step of the accent."
      soft: "Low-emphasis accent tint used as a background."
      contrast: "Text color that is legible ON `brand-primary`."
  status:
    roles: [success, warning, error, info]
    note: "`error`, not `danger` — see `variant_to_token_mapping`."
  chart:
    roles: [1, 2, 3, 4, 5, 6, 7, 8]
  ungrouped:
    note: "No group segment: `--tree-color-overlay`, `--tree-color-focus-ring`."
    semantics:
      overlay: "Scrim behind modals and drawers."
      focus-ring: "Focus indicator ring color."

variant_to_token_mapping:
  rule: >
    The component variant vocabulary and the token vocabulary use different words
    for the same concept. `danger` is a COMPONENT variant name; it has no token.
    It always resolves to the `status.error` token.
  danger:
    component_variant: danger
    token_role: status.error
    css_variable: "--tree-color-status-error"
    there_is_no: ["--tree-color-status-danger", "--tree-color-danger"]
    used_by: [TButton, TAlert, TToast, TBadge, TStat, TTimeline, TLink, TConfirmDialog]
    verified_in: packages/vue/src/styles/index.css
    examples:
      - ".t-button--danger sets --tree-button-bg: var(--tree-color-status-error)"
      - ".t-link--danger sets color: var(--tree-color-status-error)"
      - ".t-alert--danger and .t-stat--danger color-mix from var(--tree-color-status-error)"
  aligned_names:
    note: "The other status variants match their token role name directly."
    success: "--tree-color-status-success"
    warning: "--tree-color-status-warning"
    info: "--tree-color-status-info"

emitted_variables:

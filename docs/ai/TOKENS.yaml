      --tree-motion-duration-moderate: "200ms"
      --tree-motion-duration-normal: "300ms"
      --tree-motion-duration-slow: "400ms"
      --tree-motion-duration-slower: "500ms"
      --tree-motion-easing-standard: "cubic-bezier(0.2, 0, 0, 1)"
      --tree-motion-easing-easeOut: "cubic-bezier(0, 0, 0.2, 1)"
      --tree-motion-easing-easeInOut: "cubic-bezier(0.4, 0, 0.2, 1)"
      --tree-motion-easing-easeIn: "cubic-bezier(0.4, 0, 1, 1)"
      # size

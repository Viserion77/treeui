version: 0.1
package: "@treeui/tokens"
css_variable_prefix: "--tree-"
theme_selector: '[data-tree-theme="<name>"]'
themes: [light, dark]

semantic_color_roles:
  bg: [primary, surface, subtle]
  border: [default, strong]
  text: [primary, muted, inverse]
  brand: [primary, hover, soft, contrast]
  status: [success, warning, error, info]
  misc: [overlay, focus-ring]

font:
  family:
    sans: "'Google Sans Flex', 'Segoe UI', sans-serif"
    mono: "'Google Sans Code', 'SFMono-Regular', monospace"
  size:
    xs: "0.6875rem"
    sm: "0.8125rem"
    md: "0.9375rem"
    base: "0.9375rem"
    lg: "1.125rem"
    xl: "1.375rem"
    2xl: "1.375rem"
    3xl: "1.75rem"
    4xl: "2.25rem"
    5xl: "3rem"
  weight:
    regular: "400"
    medium: "500"
    semibold: "600"
    bold: "700"
    extrabold: "800"
  lineHeight:
    compact: "1.1"
    ui: "1.15"
    tight: "1.25"
    heading: "1.3"
    base: "1.5"
    body: "1.6"
    relaxed: "1.65"

space:
  0: "0"
  1: "0.25rem"
  2: "0.5rem"
  3: "0.75rem"
  4: "1rem"
  5: "1.25rem"
  6: "1.5rem"
  8: "2rem"
  12: "3rem"
  16: "4rem"

radius:
  sm: "0.375rem"
  md: "0.625rem"
  lg: "0.875rem"
  pill: "999px"

shadow:
  xs: "0 1px 2px rgba(15, 23, 42, 0.06)"
  sm: "0 6px 18px rgba(15, 23, 42, 0.08)"
  md: "0 14px 34px rgba(15, 23, 42, 0.12)"

border:
  width:
    subtle: "1px"
    strong: "1.5px"

motion:
  duration:
    fast: "100ms"
    moderate: "200ms"
    normal: "300ms"
    slow: "400ms"
    slower: "500ms"
  easing:
    standard: "cubic-bezier(0.2, 0, 0, 1)"
    easeOut: "cubic-bezier(0, 0, 0.2, 1)"
    easeInOut: "cubic-bezier(0.4, 0, 0.2, 1)"
    easeIn: "cubic-bezier(0.4, 0, 1, 1)"

size:
  control:
    sm: "2rem"
    md: "2.5rem"
    lg: "3rem"
  icon:
    sm: "1rem"
    md: "1.25rem"
    lg: "1.5rem"
    xl: "2rem"
    2xl: "3rem"

layout:
  grid:
    columns: "12"
    base: "8px"
  gutter:
    sm: "1rem"
    md: "1.5rem"
  margin:
    sm: "1.5rem"
    md: "2rem"
    lg: "3rem"

z:
  base: "1"
  dropdown: "1000"
  popover: "1050"
  sticky: "1100"
  overlay: "1200"
  modal: "1300"
  toast: "1400"

breakpoint:
  sm: "640px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"

theme_values:
  light:
    color:
      bg:
        primary: "#f6f8fa"
        surface: "#ffffff"
        subtle: "#eff2f5"
      border:
        default: "#d0d7de"
        strong: "#afb8c1"
      text:
        primary: "#1f2328"
        muted: "#59636e"
        inverse: "#ffffff"
      brand:
        primary: "#0969da"
        hover: "#0550ae"
        soft: "#ddf4ff"
        contrast: "#ffffff"
      status:
        success: "#1a7f37"
        warning: "#9a6700"
        error: "#d1242f"
        info: "#0969da"
      overlay: "rgba(31, 35, 40, 0.5)"
      focus-ring: "rgba(9, 105, 218, 0.32)"
  dark:
    color:
      bg:
        primary: "#1c2128"
        surface: "#22272e"
        subtle: "#2d333b"
      border:
        default: "#444c56"
        strong: "#576270"
      text:
        primary: "#adbac7"
        muted: "#95a3b2"
        inverse: "#1c2128"
      brand:
        primary: "#539bf5"
        hover: "#6cabf7"
        soft: "#1a3453"
        contrast: "#0a1a2f"
      status:
        success: "#57ab5a"
        warning: "#c69026"
        error: "#f47067"
        info: "#6cb6ff"
      overlay: "rgba(13, 17, 23, 0.6)"
      focus-ring: "rgba(83, 155, 245, 0.32)"

rules:
  - "Use semantic color roles, not raw hex values, in component code."
  - "Keep token naming framework-agnostic."
  - "Treat light and dark as first-class themes."

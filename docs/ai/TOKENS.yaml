      - --tree-color-focus-ring

data_viz_palette:
  variables: "--tree-color-chart-1 … --tree-color-chart-8"
  purpose: "Categorical series colors for TChart, TSparkline, and TDonutChart."
  rules:
    - "Fixed hue order (blue → orange); assign in order and never remap to a series' rank."
    - "Cycle back to slot 1 after 8; fold a 9th category into 'Other'."
    - "Validated for CVD separation and contrast against the light/dark surfaces; dark is a re-stepped set, not an auto-flip."
    - "Components pair the palette with a legend and (in TChart) 2px surface gaps so identity is never color-only."


      # breakpoint
      --tree-breakpoint-sm: "640px"
      --tree-breakpoint-md: "768px"
      --tree-breakpoint-lg: "1024px"
      --tree-breakpoint-xl: "1280px"
  theme_colors:
    count: 26
    scope: "Re-emitted per theme under [data-tree-theme]. Values in theme_values below."
    note: "The name set is identical in light and dark — verified against both."
    variables:
      - --tree-color-bg-primary
      - --tree-color-bg-surface
      - --tree-color-bg-subtle
      - --tree-color-border-default
      - --tree-color-border-strong
      - --tree-color-text-primary
      - --tree-color-text-muted
      - --tree-color-text-inverse

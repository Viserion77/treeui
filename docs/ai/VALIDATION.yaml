# ─────────────────────────────────────────────────────────────
# TreeUI — Component Validation Checklist
# ─────────────────────────────────────────────────────────────
# Critérios de aceite para cada componente da biblioteca.
# Baseado nas convenções internas do TreeUI
# (STANDARDS.yaml, CONTRACTS.yaml).
#
# Status por critério:
#   PASS   — Atende totalmente
#   WARN   — Atende parcialmente, melhoria possível
#   FAIL   — Não atende, ação necessária
#   N/A    — Não aplicável ao componente
#
# Referência de screenshots: /screenshots/<story-id>.png
# ─────────────────────────────────────────────────────────────

version: "0.1"
last-audit: "2026-04-05"

# ═══════════════════════════════════════════════════════════════
# CRITÉRIOS GLOBAIS (aplicáveis a TODOS os componentes)
# ═══════════════════════════════════════════════════════════════
global-criteria:
  naming:
    - id: NAM-01
      title: "Export público usa prefixo T"
      rule: "Componente exportado como T<Name> (ex: TButton)"
    - id: NAM-02
      title: "Alias de compatibilidade Tree<Name>"
      rule: "Alias Tree<Name> exportado em components/index.ts"
    - id: NAM-03
      title: "Arquivo fonte usa Tree<Name>.vue"
      rule: "Nome do arquivo SFC: Tree<Name>.vue"
    - id: NAM-04
      title: "Classes CSS usam BEM com prefixo tree-"
      rule: "Classes: .tree-<name>, .tree-<name>--<variant>, .tree-<name>__<slot>"
    - id: NAM-05
      title: "CSS custom properties usam --tree-*"
      rule: "Nenhum valor raw de cor/espaçamento; sempre var(--tree-*)"

  structure:
    - id: STR-01
      title: "Usa <script setup lang='ts'>"
      rule: "Script setup com TypeScript, nunca Options API"
    - id: STR-02
      title: "Props tipadas com defineProps<{}>()"
      rule: "Props definidas com interface inline e withDefaults()"
    - id: STR-03
      title: "Emits tipados com defineEmits<{}>()"
      rule: "Eventos tipados com assinatura de payload"
    - id: STR-04
      title: "Usa tipos compartilhados (TreeSize, TreeVariant, etc.)"
      rule: "Import de packages/vue/src/types/contracts.ts"
    - id: STR-05
      title: "Registrado no plugin"
      rule: "Componente registrado em packages/vue/src/plugin.ts"

  styling:
    - id: CSS-01
      title: "Sem cores hardcoded"
      rule: "Nenhum valor hex/rgb/hsl no template ou CSS; usa var(--tree-color-*)"
    - id: CSS-02
      title: "Sem espaçamento hardcoded"
      rule: "Padding/margin/gap usam var(--tree-space-*) ou tokens rem"
    - id: CSS-03
      title: "Escala de fonte respeitada"
      rule: "font-size usa var(--tree-font-size-*), nunca px arbitrário"
    - id: CSS-04
      title: "Border-radius usa tokens"
      rule: "border-radius usa var(--tree-radius-*)"
    - id: CSS-05
      title: "Sombras usam tokens"
      rule: "box-shadow usa var(--tree-shadow-*)"
    - id: CSS-06
      title: "Motion/transição usa tokens"
      rule: "transition-duration/timing usa var(--tree-motion-*)"
    - id: CSS-07
      title: "Z-index usa tokens (se overlay)"
      rule: "z-index usa var(--tree-z-*), nunca valor numérico raw"

  states:
    - id: STA-01
      title: "Estado default renderizado"
      rule: "Screenshot do estado default existe e está correto"
    - id: STA-02
      title: "Estado hover estilizado"
      rule: "CSS :hover definido com mudança visual clara"
    - id: STA-03
      title: "Estado active/pressed estilizado"
      rule: "CSS :active definido"
    - id: STA-04
      title: "Estado disabled estilizado"
      rule: "opacity + cursor: not-allowed; aria-disabled se não-nativo"
    - id: STA-05
      title: "Estado focus visível"
      rule: "focus-visible com box-shadow usando --tree-color-focus-ring"
    - id: STA-06
      title: "Estado loading (se aplicável)"
      rule: "Spinner visível, aria-busy='true', interação bloqueada"

  accessibility:
    - id: A11Y-01
      title: "Semântica HTML nativa"
      rule: "Usa <button>, <input>, <label>, role='dialog', etc."
    - id: A11Y-02
      title: "Teclado: Tab/Shift+Tab navega"
      rule: "Focável via Tab, saída via Shift+Tab"
    - id: A11Y-03
      title: "Teclado: Escape fecha (se overlay)"
      rule: "Overlays/modais/drawers fecham com Escape"
    - id: A11Y-04
      title: "Teclado: Enter/Space ativa (se interativo)"
      rule: "Elementos interativos ativam com Enter e Space"
    - id: A11Y-05
      title: "Teclado: Arrow keys (se navegação)"
      rule: "Setas navegam entre itens em listas/tabs/radios"
    - id: A11Y-06
      title: "ARIA labels presentes"
      rule: "aria-label, aria-labelledby, ou aria-describedby onde necessário"
    - id: A11Y-07
      title: "Touch target ≥ 44×44px"
      rule: "Área clicável mínima via padding ou ::after"
    - id: A11Y-08
      title: "Focus trap (se modal/drawer)"
      rule: "Tab cycling: primeiro → último → primeiro"
    - id: A11Y-09
      title: "Restauração de foco (se overlay)"
      rule: "Foco retorna ao trigger quando overlay fecha"
    - id: A11Y-10
      title: "Screen reader: status anunciado"
      rule: "role='status' ou aria-live para toasts/spinners"

  documentation:
    - id: DOC-01
      title: "Story Storybook existe"
      rule: "Arquivo em apps/docs/src/stories/<Name>.stories.ts"
    - id: DOC-02
      title: "Screenshot gerado"
      rule: "Pelo menos 1 screenshot em /screenshots/"
    - id: DOC-03
      title: "Contrato YAML atualizado"
      rule: "Arquivo docs/ai/COMPONENTS/<name>.yaml reflete API atual"
    - id: DOC-04
      title: "Testes unitários existem"
      rule: "Testes em components.test.ts cobrindo comportamento principal"

